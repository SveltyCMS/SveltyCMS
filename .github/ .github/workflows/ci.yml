name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_CACHE_DIR: .bun-cache
  NODE_OPTIONS: "--no-warnings --no-deprecation"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------
  # STAGE 0: Bootstrap
  # ------------------------------------------------
  bootstrap:
    name: 🏁 Bootstrap
    runs-on: ubuntu-latest
    outputs:
      pw-version: ${{ steps.pw.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Codegen & Sync
        run: |
          bun run paraglide
          bun x svelte-kit sync
      - name: Generate E2E Test Secret
        run: |
          mkdir -p tests/e2e/.auth
          echo "SVELTYCMS_E2E_SECRET_$(date +%s)" > tests/e2e/.auth/test-secret.txt
      - id: pw
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v7
        with:
          name: workspace-meta
          include-hidden-files: true
          path: |
            src/paraglide
            .svelte-kit
            tests/e2e/.auth/test-secret.txt

  # ------------------------------------------------
  # STAGE 1: Quality Gates
  # ------------------------------------------------
  build:
    name: 🏗️ Build
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          include-hidden-files: true
          path: |
            .svelte-kit/output
            build

  lint:
    name: 🔎 Lint
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - run: bun install --frozen-lockfile
      - run: bun run lint

  check:
    name: ✅ Type Check
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - run: bun install --frozen-lockfile
      - run: bun run check

  unit-vitest:
    name: ⚡ Unit (Vitest)
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - run: bun install --frozen-lockfile
      - run: bun run test:unit

  unit-bun:
    name: ⚡ Unit (Bun)
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - run: bun install --frozen-lockfile
      - run: bun run test:unit:bun

  # ------------------------------------------------
  # STAGE 2: Database Matrix
  # ------------------------------------------------
  db-tests:
    name: 🧪 DB (${{ matrix.db }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mongodb, mariadb, postgresql]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v7
        with: { name: build-output }
      - run: bun install --frozen-lockfile
      - name: Run Integration Tests
        env:
          DB_TYPE: ${{ matrix.db }}
          TEST_MODE: true
        run: |
          export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          bun run scripts/run-integration-tests.ts --filter=${{ matrix.db }}

  # ------------------------------------------------
  # STAGE 3: E2E Primary Flow
  # ------------------------------------------------
  e2e-wizard:
    name: 🎭 E2E (Wizard)
    needs: [build, check, unit-vitest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v7
        with: { name: build-output }
      - run: bun install --frozen-lockfile
      - run: bun x playwright install --with-deps chromium
      - name: Run Wizard E2E
        env:
          DB_TYPE: sqlite
          TEST_MODE: true
        run: |
          export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          bun run preview --port 4173 --host 127.0.0.1 > preview.log 2>&1 &
          bun x playwright test --project=wizard

  e2e-auth-setup:
    name: 🎭 E2E (Auth Setup)
    needs: e2e-wizard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v7
        with: { name: build-output }
      - run: bun install --frozen-lockfile
      - run: bun x playwright install --with-deps chromium
      - name: Run Auth Setup
        env:
          DB_TYPE: sqlite
          TEST_MODE: true
        run: |
          export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          bun run preview --port 4173 --host 127.0.0.1 > preview.log 2>&1 &
          bun x playwright test --project=auth-setup
      - uses: actions/upload-artifact@v7
        with:
          name: auth-state
          path: tests/e2e/.auth/

  # ------------------------------------------------
  # STAGE 4: E2E Parallel Matrix
  # ------------------------------------------------
  e2e:
    name: 🎭 🚩 E2E (${{ matrix.project }})
    needs: e2e-auth-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [signup, content, system]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v7
        with: { name: build-output }
      - uses: actions/download-artifact@v7
        with: { name: auth-state }
      - run: bun install --frozen-lockfile
      - run: bun x playwright install --with-deps chromium
      - name: Run E2E Project
        env:
          DB_TYPE: sqlite
          TEST_MODE: true
        run: |
          export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          bun run preview --port 4173 --host 127.0.0.1 > preview.log 2>&1 &
          bun x playwright test --project=${{ matrix.project }}

  # ------------------------------------------------
  # STAGE 5: Benchmarks
  # ------------------------------------------------
  benchmarks:
    name: 📊 Benchmarks
    needs: db-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v7
        with: { name: build-output }
      - run: bun install --frozen-lockfile
      - run: bun run scripts/enterprise-matrix.ts
