name: Setup SveltyCMS
description: Install Bun, Node, dependencies and optionally restore build artifacts

inputs:
  bun-version:
    description: Bun version to install
    required: false
    default: "1.3.14"
  node-version:
    description: Node.js version to install
    required: false
    default: "24"
  restore-build:
    description: Whether to restore build-output and workspace-meta artifacts
    required: false
    default: "false"
  pnpm-run-install:
    description: When 'true', uses pnpm instead of bun for install (Windows workaround)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache Bun dependencies
      id: cache-bun
      uses: actions/cache@v5
      with:
        path: |
          node_modules
          .bun-cache
          ~/.bun
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: Ensure Bun cache dir
      shell: bash
      run: mkdir -p .bun-cache

    - name: Install dependencies
      if: inputs.pnpm-run-install != 'true'
      shell: bash
      run: bun install --prefer-offline --cache-dir .bun-cache

    - name: Install dependencies (pnpm fallback)
      if: inputs.pnpm-run-install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline

    - name: Download build-output artifact
      if: inputs.restore-build == 'true'
      uses: actions/download-artifact@v8
      with:
        name: build-output
        path: .

    - name: Download workspace-meta artifact
      if: inputs.restore-build == 'true'
      uses: actions/download-artifact@v8
      with:
        name: workspace-meta
        path: .

    - name: Extract build-output tar.zst
      if: inputs.restore-build == 'true'
      shell: bash
      run: |
        if [ -f build-output.tar.zst ]; then
          tar --zstd -xf build-output.tar.zst
          rm build-output.tar.zst
        fi
