# .github/workflows/docs-lint.yml
# Test documentation files for linting errors and build verification on pull requests that modify documentation or related source code.
name: Docs & Component Build Verification

on:
  pull_request:
    paths:
      # --- Trigger on any documentation file change ---
      - "docs/**.mdx"
      - "docs/**/*.mdx"
      # --- Trigger on any component/widget change that impacts docs ---
      - "src/widgets/**/*.svelte"
      - "src/widgets/**/*.ts"
      # --- Trigger on any CI/Workflow config change ---
      - ".github/workflows/**/*.yml"
      - "src/utils/**/*.ts"
      - "src/databases/**.ts"
      - "scripts/**/*.ts"
      - "tests/**.ts"

# Set minimal permissions for all jobs in this workflow
permissions:
  contents: read

jobs:
  validate-documentation:
    runs-on: ubuntu-latest # Ubuntu environment for CI
    timeout-minutes: 10 # Increased timeout for comprehensive build/linting
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile --prefer-offline --cache-dir ~/.bun/install/cache

      # === STEP 1: LINTING (The quick check) ===
      - name: Run Documentation Linter (Semantic Check)
        # This assumes 'tests/lint-docs.ts' exists and runs structural checks.
        # This catches misplaced tags or structural errors.
        run: bun tests/lint-docs.ts

      # === STEP 1b: CODEGEN (Required before type-checking) ===
      - name: Generate Paraglide & SvelteKit types
        run: bun run paraglide && bunx svelte-kit sync

      # === STEP 2: STATIC ANALYSIS (The Deep Code Check) ===
      - name: Run Comprehensive Code & Doc Linting
        # Running the full 'check' suite ensures all type contracts are valid,
        # and running 'lint' ensures code style consistency.
        run: bun run check && bun run lint

      # === STEP 3: DOCUMENTATION BUILD (The Crucial Step) ===
      - name: Build Documentation Artifacts (Build Verification)
        # This attempts to compile the entire documentation site.
        # If any MDX component fails to load, resolve, or compile, this step will fail.
        run: bun run build
        # Note: We use 'bun run build' as it typically handles MDX compilation in SvelteKit

      # === STEP 4: Full Integration Sanity Check ===
      # After documenting the system, we must prove the system works.
      - name: Run Core Integration Sanity Checks
        # Run a limited, fast subset of integration tests to ensure the core API is functional.
        run: bun run scripts/run-integration-tests.ts --db=sqlite --no-build
