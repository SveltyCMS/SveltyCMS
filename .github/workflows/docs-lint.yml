# .github/workflows/docs-lint.yml
# Test documentation files for linting errors and build verification on pull requests that modify documentation or related source code.
name: Docs & Component Build Verification

on:
  pull_request:
    paths:
      # --- Trigger on any documentation file change ---
      - "docs/**.mdx"
      - "docs/**/*.mdx"
      # --- Trigger on any component/widget change that impacts docs ---
      - "src/widgets/**/*.svelte"
      - "src/widgets/**/*.ts"
      # --- Trigger on any CI/Workflow config change ---
      - ".github/workflows/**/*.yml"
      - "src/utils/**/*.ts"
      - "src/databases/**.ts"
      - "scripts/**/*.ts"
      - "tests/**.ts"

# Set minimal permissions for all jobs in this workflow
permissions:
  contents: read

env:
  BUN_CACHE_DIR: .bun-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-documentation:
    runs-on: ubuntu-latest # Ubuntu environment for CI
    timeout-minutes: 8 # Doc lint + type check only (build moved to ci.yml)
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Prepare Bun cache dir
        run: mkdir -p ${{ env.BUN_CACHE_DIR }}

      - name: Install Dependencies
        run: bun install --frozen-lockfile --prefer-offline --cache-dir ${{ env.BUN_CACHE_DIR }}

      # === STEP 1: LINTING (The quick check) ===
      - name: Run Documentation Linter (Semantic Check)
        # This assumes 'tests/lint-docs.ts' exists and runs structural checks.
        # This catches misplaced tags or structural errors.
        run: bun tests/lint-docs.ts

      # === STEP 1b: CODEGEN (Required before type-checking) ===
      - name: Generate Paraglide & SvelteKit types
        run: bun run paraglide && bun x svelte-kit sync

      # === STEP 2: STATIC ANALYSIS (Type check only) ===
      - name: Run Type Check
        run: bun run check

      # === STEP 3: Build verification removed — ci.yml handles this on push ===
      # === STEP 4: Integration tests removed — ci.yml handles this on push ===
