name: CI

on:
  push:
    branches: [main, next]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  pull_request:
    branches: [main, next]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_CACHE_DIR: .bun-cache
  NODE_OPTIONS: '--no-warnings --no-deprecation'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------
  # 1. Bootstrap
  # ------------------------------------------------

  bootstrap:
    name: 🏁 Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      pw-version: ${{ steps.pw.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: mkdir -p ${{ env.BUN_CACHE_DIR }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir ${{ env.BUN_CACHE_DIR }}

      - name: Verify Codegen
        run: |
          bun run paraglide
          bun x svelte-kit sync

      - id: pw
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v6
        with:
          name: workspace-meta
          include-hidden-files: true
          path: |
            src/paraglide
            .svelte-kit

  # ------------------------------------------------
  # 2. Quality gates
  # ------------------------------------------------

  lint:
    name: 🔎 Lint
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run lint

  check:
    name: ✅ Check
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      
      - name: Run System Setup (Real Black-Box)
        env:
          DB_TYPE: sqlite
          TEST_MODE: true
        run: |
          # Start server in background
          bun run preview --port 4173 --host 127.0.0.1 > preview.log 2>&1 &
          # Wait for server health
          bun x wait-on http://127.0.0.1:4173/api/system/health --timeout 60000
          # Run system setup via API
          bun run scripts/setup-system.ts
          
      - run: bun run check

  unit-vitest:
    name: ⚡ Unit (Vitest)
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run test:unit

      - uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: vitest

  unit-bun:
    name: ⚡ Unit (Bun)
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run test:unit:bun

      - uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: bun

  # ------------------------------------------------
  # 3. Build
  # ------------------------------------------------

  build:
    name: 🏗️ Build
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run build

      - uses: actions/upload-artifact@v6
        with:
          name: build-output
          include-hidden-files: true
          path: |
            .svelte-kit/output
            build

  # ------------------------------------------------
  # 4. DB tests (SQLite)
  # ------------------------------------------------

  db-tests-sqlite:
    name: 🧪 DB (sqlite)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v6
        with:
          name: build-output

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - name: Run SQLite tests
        env:
          DB_TYPE: sqlite
          DB_NAME: sveltycms_test
          TEST_MODE: true
        run: bun run scripts/run-integration-tests.ts

  # ------------------------------------------------
  # 5. DB tests (other)
  # ------------------------------------------------

  db-tests:
    name: 🧪 DB (${{ matrix.db }})
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - db: mongodb
            image: mongo:7
            port: 27017

          - db: mariadb
            image: mariadb:11
            port: 3306

          - db: postgresql
            image: postgres:16
            port: 5432

    services:
      db:
        image: ${{ matrix.image }}
        ports:
          - ${{ matrix.port }}:${{ matrix.port }}
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${{ matrix.db == 'mariadb' && 'yes' || '' }}
          MARIADB_DATABASE: ${{ matrix.db == 'mariadb' && 'sveltycms_test' || '' }}
          MARIADB_USER: ${{ matrix.db == 'mariadb' && 'testuser' || '' }}
          MARIADB_PASSWORD: ${{ matrix.db == 'mariadb' && 'testpass' || '' }}
          POSTGRES_USER: ${{ matrix.db == 'postgresql' && 'testuser' || '' }}
          POSTGRES_PASSWORD: ${{ matrix.db == 'postgresql' && 'testpass' || '' }}
          POSTGRES_DB: ${{ matrix.db == 'postgresql' && 'sveltycms_test' || '' }}
          MONGO_INITDB_ROOT_USERNAME: ${{ matrix.db == 'mongodb' && 'testuser' || '' }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ matrix.db == 'mongodb' && 'testpass' || '' }}

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v6
        with:
          name: build-output

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - run: |
          bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 60000
          sleep 5

      - name: Run DB tests
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_NAME: sveltycms_test
          DB_USER: testuser
          DB_PASSWORD: testpass
          TEST_MODE: true
        run: bun run scripts/run-integration-tests.ts --filter=${{ matrix.db }}

  # ------------------------------------------------
  # 6. E2E tests (playwright shard)
  # ------------------------------------------------

  e2e:
    name: 🎭 E2E (shard ${{ matrix.shard }})
    needs: [bootstrap, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v6
        with:
          name: build-output

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - run: bun x playwright install --with-deps chromium

      - name: Run E2E tests (Playwright shard)
        env:
          DB_TYPE: sqlite
          TEST_MODE: true
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:4173
        run: |
          # Start server in background
          bun run preview --port 4173 --host 127.0.0.1 > preview.log 2>&1 &

          # Wait for server health
          bun x wait-on http://127.0.0.1:4173/api/system/health --timeout 60000

          # Run system setup via API
          bun run scripts/setup-system.ts

          # Run Playwright tests
          bun x playwright test --project=chromium --shard=${{ matrix.shard }}/3

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report

  # ------------------------------------------------
  # 7. Performance Benchmarks
  # ------------------------------------------------

  benchmarks:
    name: 📊 Benchmarks
    needs: [db-tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v6
        with:
          name: build-output

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - name: Run System Setup (Black-Box)
        env:
          DB_TYPE: sqlite
          TEST_MODE: true
        run: |
          # Start server in background
          bun run preview --port 4173 --host 127.0.0.1 > preview.log 2>&1 &
          # Wait for server health
          bun x wait-on http://127.0.0.1:4173/api/system/health --timeout 60000
          # Run system setup via API
          bun run scripts/setup-system.ts

      - name: Run Hooks Benchmark
        env:
          TEST_MODE: true
        run: |
          echo "### ⚡ Middleware Hooks Performance" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          bun run tests/benchmarks/hooks-performance.ts >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run Database Benchmark
        env:
          TEST_MODE: true
        run: |
          echo "### 💾 Raw Database Performance" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Run the new agnostic benchmark
          bun x vitest run -c vitest.benchmark.config.ts >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
