name: CI

# CI Workflow for SveltyCMS
#
# Local developer entry points:
#   bun run verify:push     # pre-push hook (static analysis, unit tests, build)
#   bun run scripts/precheck.ts --plan    # inspect what WOULD run (dry-run)
#   bun run scripts/precheck.ts --tier=push --include-db-tasks  # optional DB matrix
#
# This workflow is the authoritative full matrix.
# Local hooks intentionally omit DB matrix, benchmarks, and E2E.
# on push tier by default. Use --include-db-tasks to opt in locally.
#
# Job-to-local-task mapping is maintained via ciJob fields in
# scripts/precheck-shared.ts (BaseTasks / createDbTasks).

on:
  push:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
  pull_request:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.ref_protected && github.sha || '' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_CACHE_DIR: .bun-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DO_NOT_TRACK: 1

jobs:
  # ------------------------------------------------
  # 1. Bootstrap — single source of truth for deps + codegen
  # ------------------------------------------------
  bootstrap:
    name: 🏁 Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      pw-version: ${{ steps.pw.outputs.version }}
      test-secret: ${{ steps.secret-gen.outputs.secret }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Environment
        uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"

      - name: Verify Codegen
        run: |
          bun run paraglide
          bun x svelte-kit sync

      - name: Generate Test Secret
        id: secret-gen
        run: |
          mkdir -p tests/e2e/.auth
          if [ -n "${{ secrets.TEST_API_SECRET }}" ]; then
            SECRET_VAL="${{ secrets.TEST_API_SECRET }}"
          else
            SECRET_VAL="SVELTYCMS_CI_FALLBACK_$(date +%s)_${RANDOM}"
            echo "⚠️ Using CI fallback secret (fork PR or missing repo secret)"
          fi
          echo "$SECRET_VAL" > tests/e2e/.auth/test-secret.txt
          echo "secret=$SECRET_VAL" >> $GITHUB_OUTPUT

      - id: pw
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: workspace-meta
          include-hidden-files: true
          path: |
            src/paraglide
            .svelte-kit
            tests/e2e/.auth/test-secret.txt
          retention-days: 1

  # ------------------------------------------------
  # 2. Quality gates (parallel, no artifact deps beyond bootstrap meta)
  # ------------------------------------------------
  whitebox:
    name: ${{ matrix.name }}
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: 01-format
            name: 🖌️ Format Check
            run: bun run format --check
          - task: 02-lint
            name: 🔎 Lint
            run: bun run lint
          - task: 03-check
            name: ✅ Quality Gate (check)
            run: bun run check
          - task: 04-unit
            name: ⚡ Unit Tests
            run: bun run test:unit
          - task: 05-cve-audit
            name: 🔒 CVE Dependency Audit
            run: |
              bun audit --severity=high 2>&1
          - task: 06-secret-misuse
            name: 🔑 Secret Misuse Scan
            run: bun run scripts/scan-secret-misuse.ts --strict
          - task: 07-deploy-backdoor
            name: 🚪 Deploy Backdoor Probe (A01)
            run: bun run scripts/probe-deploy-testing-api.ts
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - name: Download workspace-meta
        if: matrix.task != '05-cve-audit'
        uses: actions/download-artifact@v8
        with:
          name: workspace-meta
      - name: Run Task
        run: ${{ matrix.run }}
      - name: CVE Audit Summary
        if: matrix.task == '05-cve-audit'
        run: |
          echo "### 🔒 Dependency Audit (CVE Check)" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          if bun audit --severity=high 2>&1; then
            echo "| bun audit | ✅ No high/critical vulnerabilities |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| bun audit | ❌ Vulnerabilities found |" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload coverage
        if: matrix.task == '04-unit' && success()
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit

  # ------------------------------------------------
  # 3. Build — single artifact for all downstream jobs
  # ------------------------------------------------
  build:
    name: 🏗️ Build
    needs: [bootstrap]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - name: Clean stale build output
        run: rm -rf build .svelte-kit/output
      - run: bun run build
        env:
          COMPILE_ALL_ADAPTERS: "true"
      - name: Verify benchmark build includes testing harness
        run: bun run scripts/verify-prod-build-backdoor.ts --mode=bench
      - name: Verify bundle size (no TipTap leak, entry < 80KB)
        run: bun run scripts/check-bundle-size.ts
      - name: Compute build artifact checksum
        run: |
          find build/ .svelte-kit/output/ -type f -exec sha256sum {} \; | sort | sha256sum | cut -d' ' -f1 > build-checksum.txt
      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          include-hidden-files: true
          path: |
            build/
            .svelte-kit/output/
            build-checksum.txt
          retention-days: 1

  # ------------------------------------------------
  # 4. DB Matrix — TS config
  # ------------------------------------------------
  db-matrix:
    name: 📋 DB Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            .github/workflows
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate DB Matrix
        id: generate
        run: |
          matrix=$(node .github/workflows/db-matrix.ts)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  # ------------------------------------------------
  # 5. DB Integration Tests (Docker Compose profiles)
  # ------------------------------------------------
  db-tests:
    name: 🧪 DB (${{ matrix.db }})
    needs: [build, db-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.db-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          restore-build: "true"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }

      - name: Verify build artifact checksum
        run: |
          COMPUTED=$(find build/ .svelte-kit/output/ -type f -exec sha256sum {} \; | sort | sha256sum | cut -d' ' -f1)
          EXPECTED=$(cat build-checksum.txt)
          if [ "$COMPUTED" != "$EXPECTED" ]; then
            echo "❌ Build artifact checksum mismatch!"
            echo "  Computed: $COMPUTED"
            echo "  Expected: $EXPECTED"
            exit 1
          fi
          echo "✅ Build artifact checksum verified"

      - name: Start Database (Docker Compose)
        if: matrix.db != 'sqlite'
        run: |
          docker compose -f tests/docker-compose.yml --profile ${{ matrix.db }} up -d --wait
          bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 90000 --interval 2000

      - name: Start UDH External Postgres Fixture
        if: matrix.db != 'postgresql'
        run: |
          docker compose -f tests/docker-compose.yml --profile postgresql up -d --wait
          bun x wait-on tcp:127.0.0.1:5432 --timeout 90000 --interval 2000

      - name: Run Integration Tests
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port || '' }}
          DB_NAME: sveltycms_test
          DB_USER: ${{ matrix.db_user }}
          DB_PASSWORD: ${{ matrix.db_password }}
          JWT_SECRET_KEY: Integration-Test-JWT-Secret-Key-2026
          ENCRYPTION_KEY: Integration-Encryption-Key-2026-32ch
          TEST_API_SECRET: ${{ needs.bootstrap.outputs.test-secret }}
          ADMIN_PASSWORD: Password123!
          TEST_MODE: true
          PASSWORD_MIN_LENGTH: 8
          PORT: "4173"
        run: |
          bun run scripts/run-integration-tests.ts --db=${{ matrix.db }} --no-build

      - name: Dump Docker Logs on Failure
        if: failure() && matrix.db != 'sqlite'
        run: docker compose -f tests/docker-compose.yml --profile ${{ matrix.db }} logs

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-log-${{ matrix.db }}
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Integration Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-results-${{ matrix.db }}
          path: tests/test-results/integration-${{ matrix.db }}.json
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 8. DB Summary — cross-adapter results dashboard
  # ------------------------------------------------
  db-summary:
    name: 📋 DB Summary
    needs: [db-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: db-results-*
          path: tests/test-results
          merge-multiple: true

      - name: Generate DB Summary
        run: |
          echo "## Multi-DB Integration Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Adapter | Passed | Failed | Total |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          ANY_FAIL=0
          for f in tests/test-results/integration-*.json; do
            if [ -f "$f" ]; then
              db=$(echo "$f" | sed 's/.*integration-\(.*\)\.json/\1/')
              passed=$(node -e "const j=require('./$f'); process.stdout.write(String(j.passed??0))")
              failed=$(node -e "const j=require('./$f'); process.stdout.write(String(j.failed??0))")
              total=$(node -e "const j=require('./$f'); process.stdout.write(String(j.total??0))")
              if [ "$failed" = "0" ]; then
                icon="✅"
              else
                icon="❌"
                ANY_FAIL=1
              fi
              echo "| $icon $db | $passed | $failed | $total |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          # Expand per-adapter failure snippets for faster triage
          for f in tests/test-results/integration-*.json; do
            if [ -f "$f" ]; then
              node -e '
                const fs = require("fs");
                const j = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
                if (!j.failed || !j.failures?.length) process.exit(0);
                let md = "\n<details open><summary>❌ " + j.db + " failures</summary>\n\n";
                md += "| File | Error |\n|------|-------|\n";
                for (const x of j.failures.slice(0, 20)) {
                  const err = (x.stderr || "").split("\n").map(s => s.trim()).find(Boolean) || "";
                  md += "| `" + x.file + "` | " + err.replace(/\|/g, "\\|").slice(0, 140) + " |\n";
                }
                md += "\n</details>\n";
                fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
              ' "$f" || true
            fi
          done
          if [ "$ANY_FAIL" = "1" ]; then
            echo "::error::One or more DB adapters failed integration tests — see Multi-DB Integration Results above"
          fi

  # ------------------------------------------------
  # 9. Core Benchmarks (fast perf gate per DB adapter)
  # ------------------------------------------------
  bench-core:
    name: 📊 Bench (${{ matrix.db }})
    needs: [build, db-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.db-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          restore-build: "true"
      - uses: actions/download-artifact@v8
        with: { name: build-output }

      - name: Start Database
        if: matrix.db != 'sqlite'
        run: |
          docker compose -f tests/docker-compose.yml --profile ${{ matrix.db }} up -d --wait
          bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 90000 --interval 2000

      - name: Create UDH Fixture Database (PostgreSQL only)
        if: matrix.db == 'postgresql'
        run: |
          docker exec sveltycms-postgresql psql -U postgres -c "CREATE DATABASE sveltycms_udh_fixture;" 2>/dev/null || true

      - name: Start UDH External Postgres Fixture
        if: matrix.db != 'postgresql'
        run: |
          docker compose -f tests/docker-compose.yml --profile postgresql up -d --wait
          bun x wait-on tcp:127.0.0.1:5432 --timeout 90000 --interval 2000

      - name: Run Core Benchmarks
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port || '' }}
          DB_NAME: ${{ matrix.db == 'sqlite' && 'benchmark_shared' || 'sveltycms_test' }}
          DB_USER: ${{ matrix.db_user }}
          DB_PASSWORD: ${{ matrix.db_password }}
          ADMIN_PASSWORD: Password123!
          PASSWORD_MIN_LENGTH: 8
          TEST_MODE: "true"
          BENCHMARK_PROFILE: "ci-fresh"
          BENCHMARK_NO_REDIS: "1"
          BENCHMARK_RECORD: "1"
          TEST_API_SECRET: ${{ needs.bootstrap.outputs.test-secret }}
          UDH_PG_DATABASE: ${{ matrix.db == 'postgresql' && 'sveltycms_udh_fixture' || 'sveltycms_test' }}
        run: |
          mkdir -p tests/e2e/.auth
          if [ -n "${TEST_API_SECRET}" ]; then
            echo "${TEST_API_SECRET}" > tests/e2e/.auth/test-secret.txt
          else
            TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          fi
          export TEST_API_SECRET
          set -o pipefail
          bun run scripts/run-core-benchmarks.ts --db=${{ matrix.db }} 2>&1 | tee bench-output.log

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report-${{ matrix.db }}
          path: docs/project/benchmarks/benchmark_${{ matrix.db }}.mdx
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload benchmark log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-log-${{ matrix.db }}
          path: bench-output.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Dump Docker Logs on Failure
        if: failure() && matrix.db != 'sqlite'
        run: docker compose -f tests/docker-compose.yml --profile ${{ matrix.db }} logs

      - name: Teardown Docker
        if: always() && matrix.db != 'sqlite'
        run: |
          docker compose -f tests/docker-compose.yml --profile ${{ matrix.db }} down -v 2>/dev/null || true
          docker compose -f tests/docker-compose.yml --profile postgresql down -v 2>/dev/null || true

  # ------------------------------------------------
  bench-summary:
    name: 📊 Bench Summary
    needs: [bench-core]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Download all benchmark reports
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: benchmark-report-*
          path: docs/project/benchmarks
          merge-multiple: true
      - name: Generate CI Summary
        continue-on-error: true
        run: node scripts/benchmark-matrix/generate-ci-markdown.ts

  # ------------------------------------------------
  # 6. E2E Prep — auth state only (single artifact)
  # ------------------------------------------------
  e2e-prep:
    name: 🧪 E2E Prep
    needs: [bootstrap, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DB_TYPE: sqlite
      DB_HOST: 127.0.0.1
      DB_NAME: e2e_auth_test
      DB_USER: ""
      DB_PASSWORD: ""
      PASSWORD_MIN_LENGTH: 8
      TEST_MODE: "true"
      SKIP_TEST_CLEANUP: "true"
      ADMIN_PASSWORD: Password123!
      JWT_SECRET_KEY: Auth-Setup-JWT-Secret-Key-2026-32ch
      ENCRYPTION_KEY: Auth-Setup-Encryption-Key-2026-32ch
      TEST_API_SECRET: ${{ needs.bootstrap.outputs.test-secret }}
      HOST: 127.0.0.1
      PORT: 4173
      # index.cjs defaults ORIGIN to https://demo.sveltycms.com which breaks SvelteKit
      # remote CSRF (Origin header must match request URL origin for completeSetup).
      ORIGIN: http://127.0.0.1:4173
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          restore-build: "true"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: bun x playwright install --with-deps chromium

      - name: Install Playwright Deps Only
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: bun x playwright install-deps chromium

      - name: Initialize and Start Preview Server
        run: |
          mkdir -p config config/database config/collections tests/e2e/.auth logs mediaFolder

          cat > config/private.test.ts <<EOF
          export const privateEnv = {
            DB_TYPE: "sqlite",
            DB_HOST: "127.0.0.1",
            DB_NAME: "e2e_auth_test",
            DB_USER: "",
            DB_PASSWORD: "",
            JWT_SECRET_KEY: "Auth-Setup-JWT-Secret-Key-2026-32ch",
            ENCRYPTION_KEY: "Auth-Setup-Encryption-Key-2026-32ch",
            TEST_API_SECRET: "${TEST_API_SECRET}",
            PASSWORD_MIN_LENGTH: 8,
            USE_REDIS: false,
            MULTI_TENANT: false,
            DEMO: false,
            HOST_PROD: "http://127.0.0.1:4173"
          };
          export const privateConfig = privateEnv;
          export default privateEnv;
          EOF

          cp config/private.test.ts config/private.ts

          # Overwrite the random test-secret.txt with the actual repo secret only if it is set
          # so test-orch.ts and the server agree on TEST_API_SECRET
          if [ -n "${TEST_API_SECRET}" ]; then
            echo "${TEST_API_SECRET}" > tests/e2e/.auth/test-secret.txt
          else
            TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
            echo "TEST_API_SECRET=${TEST_API_SECRET}" >> $GITHUB_ENV
          fi

          # Prefer adapter-node entry (build/index.js) with correct ORIGIN for remotes.
          # Fall back to index.cjs (Plesk entry) only if needed — always pin ORIGIN.
          export ORIGIN="${ORIGIN:-http://127.0.0.1:4173}"
          if [ -f build/index.js ]; then
            node build/index.js > preview.log 2>&1 &
          else
            node index.cjs > preview.log 2>&1 &
          fi
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          trap "kill $SERVER_PID 2>/dev/null || true" INT TERM
          bun x wait-on tcp:127.0.0.1:4173 --timeout 180000 --interval 500
          echo "PLAYWRIGHT_TEST_BASE_URL=http://127.0.0.1:4173" >> $GITHUB_ENV
          echo "ORIGIN=${ORIGIN}" >> $GITHUB_ENV

      - name: Run E2E Wizard Setup
        run: bun x playwright test --project=wizard

      - name: Run E2E Auth Setup
        run: bun x playwright test --project=auth-setup

      # Fail closed: empty admin.json (CSRF-only / no auth_sessions) poisons every chromium shard
      # with missing page-title and 401s. Catch it here instead of after 15 min of flaky retries.
      - name: Verify auth storageState has session cookie
        run: |
          node -e '
            const fs = require("fs");
            const p = "tests/e2e/.auth/admin.json";
            if (!fs.existsSync(p)) { console.error("missing", p); process.exit(1); }
            const s = JSON.parse(fs.readFileSync(p, "utf8"));
            const names = (s.cookies || []).map((c) => c.name);
            const ok = names.some((n) => /auth_sessions/i.test(n));
            console.log("admin.json cookies:", names.join(", ") || "(none)");
            if (!ok) {
              console.error("FAIL: no auth_sessions cookie in admin.json — auth-setup did not establish a session");
              process.exit(1);
            }
            console.log("OK: session cookie present");
          '

      - name: Smart Playwright summary (wizard + auth-setup)
        if: always()
        run: bun run scripts/ci-report-playwright.ts --label="E2E Prep (wizard + auth-setup)" --json=tests/playwright-results.json --preview=preview.log

      - name: Shutdown Preview Server
        if: always()
        run: |
          pkill -f "node build/index.js" || true
          pkill -f "node index.cjs" || true
          sleep 2

      - name: Archive E2E Environment (single artifact)
        run: tar --zstd -cf e2e-env.tar.zst build/ .svelte-kit/ src/paraglide/ tests/e2e/.auth/ config/private.ts config/private.test.ts config/database/ config/collections/

      - uses: actions/upload-artifact@v7
        with:
          name: e2e-env-${{ github.sha }}
          path: e2e-env.tar.zst
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: playwright-report-Wizard-Auth
          path: |
            tests/playwright-report
            tests/playwright-results.json
          if-no-files-found: ignore
          retention-days: 14

      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: preview-log-prep
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 7. E2E Matrix — named shard groups
  # ------------------------------------------------
  e2e-matrix:
    name: 📋 E2E Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            .github/workflows
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate E2E Matrix
        id: generate
        run: |
          matrix=$(node .github/workflows/e2e-matrix.ts)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  # ------------------------------------------------
  # 8. E2E Tests — named groups with grep filtering
  # ------------------------------------------------
  # wizard + firstuser + auth-setup run sequentially in e2e-prep.
  # All other CMS route tests run here via named chromium shards.
  e2e:
    name: 🧪 E2E — ${{ matrix.name }}
    needs: [bootstrap, e2e-prep, e2e-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.e2e-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          pnpm-run-install: "false"

      - name: Download E2E Environment
        uses: actions/download-artifact@v8
        with:
          name: e2e-env-${{ github.sha }}
          path: .

      - name: Extract E2E Environment
        run: |
          if [ ! -f e2e-env.tar.zst ]; then
            echo "::error::E2E prep artifact missing. Re-run workflow."
            exit 1
          fi
          tar --zstd -xf e2e-env.tar.zst
          rm e2e-env.tar.zst
          mkdir -p config/collections

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: bun x playwright install --with-deps chromium

      - name: Install Playwright Deps Only
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: bun x playwright install-deps chromium

      - name: Run E2E Tests
        env:
          DB_TYPE: sqlite
          DB_HOST: 127.0.0.1
          DB_NAME: e2e_auth_test
          DB_USER: ""
          DB_PASSWORD: ""
          PASSWORD_MIN_LENGTH: 8
          TEST_MODE: "true"
          SKIP_TEST_CLEANUP: "true"
          ADMIN_PASSWORD: Password123!
          JWT_SECRET_KEY: Auth-Setup-JWT-Secret-Key-2026-32ch
          ENCRYPTION_KEY: Auth-Setup-Encryption-Key-2026-32ch
          TEST_API_SECRET: ${{ needs.bootstrap.outputs.test-secret }}
          HOST: 127.0.0.1
          PORT: 4173
          ORIGIN: http://127.0.0.1:4173
          SKIP_E2E_DEPS: "true"
        run: |
          if [ -z "${TEST_API_SECRET}" ]; then
            TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          fi
          export TEST_API_SECRET
          export PLAYWRIGHT_TEST_BASE_URL=http://127.0.0.1:4173
          export ORIGIN="${ORIGIN:-http://127.0.0.1:4173}"
          if [ -f build/index.js ]; then
            node build/index.js > preview.log 2>&1 &
          else
            node index.cjs > preview.log 2>&1 &
          fi
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT INT TERM
          bun x wait-on tcp:127.0.0.1:4173 --timeout 120000 --interval 500
          bun x playwright test \
            --project=chromium \
            --grep="${{ matrix.grep }}" \
            --shard=${{ matrix.shard }}

      - name: Smart Playwright summary
        if: always()
        run: bun run scripts/ci-report-playwright.ts --label="E2E — ${{ matrix.name }}" --json=tests/playwright-results.json --preview=preview.log

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.name }}
          path: |
            tests/playwright-report
            tests/playwright-results.json
          if-no-files-found: ignore
          retention-days: 14

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: preview-log-${{ matrix.name }}
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 10. All Green Gate
  # ------------------------------------------------
  all-green:
    name: ✅ All Green
    if: always()
    runs-on: ubuntu-latest
    needs:
      - bootstrap
      - build
      - whitebox
      - e2e-prep
      - e2e-matrix
      - e2e
      - db-tests
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            scripts/ci-report-all-green.ts
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Job results dashboard
        if: always()
        env:
          RESULT_BOOTSTRAP: ${{ needs.bootstrap.result }}
          RESULT_BUILD: ${{ needs.build.result }}
          RESULT_WHITEBOX: ${{ needs.whitebox.result }}
          RESULT_E2E_PREP: ${{ needs.e2e-prep.result }}
          RESULT_E2E_MATRIX: ${{ needs.e2e-matrix.result }}
          RESULT_E2E: ${{ needs.e2e.result }}
          RESULT_DB_TESTS: ${{ needs.db-tests.result }}
        run: bun run scripts/ci-report-all-green.ts
      - if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: |
          echo "::error::One or more required jobs failed or were cancelled — see All-Green Gate summary for fix order"
          exit 1
      - if: ${{ !cancelled() && !failure() }}
        run: echo "✅ All checks passed"

  bench-green:
    name: 📊 Bench Green
    if: always()
    runs-on: ubuntu-latest
    needs:
      - bench-core
      - bench-summary
    steps:
      - if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: |
          echo "::warning::One or more benchmarks failed (non-blocking)"
      - if: ${{ !cancelled() && !failure() }}
        run: echo "✅ All benchmarks passed"
