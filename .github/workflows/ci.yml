name: CI

on:
  push:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
  pull_request:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_CACHE_DIR: .bun-cache
  NODE_OPTIONS: "--no-warnings --no-deprecation"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------
  # 1. Bootstrap
  # ------------------------------------------------

  bootstrap:
    name: 🏁 Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      pw-version: ${{ steps.pw.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: mkdir -p ${{ env.BUN_CACHE_DIR }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir ${{ env.BUN_CACHE_DIR }}

      - name: Verify Codegen
        run: |
          bun run paraglide
          bun x svelte-kit sync

      - name: Generate E2E Test Secret
        run: |
          mkdir -p tests/e2e/.auth
          echo "SVELTYCMS_E2E_MASTER_SECRET_$(date +%s)" > tests/e2e/.auth/test-secret.txt

      - id: pw
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: workspace-meta
          include-hidden-files: true
          path: |
            src/paraglide
            .svelte-kit
            tests/e2e/.auth/test-secret.txt

  # ------------------------------------------------
  # 2. Quality gates
  # ------------------------------------------------

  lint:
    name: 🔎 Lint
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v7
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run lint

  #  check:
  #    name: ✅ Check
  #    needs: bootstrap
  #    runs-on: ubuntu-latest
  #
  #    steps:
  #      - uses: actions/checkout@v6
  #      - uses: oven-sh/setup-bun@v2
  #
  #      - uses: actions/download-artifact@v7
  #        with:
  #          name: workspace-meta
  #
  #      - uses: actions/cache@v5
  #        with:
  #          path: |
  #            .bun-cache
  #            ~/.bun/install/cache
  #          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
  #
  #      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
  #      - run: bun run check

  # ------------------------------------------------
  # 3. Build (moved up to support db-tests/e2e)
  # ------------------------------------------------

  build:
    name: 🏗️ Build
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v7
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run build

      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          include-hidden-files: true
          path: |
            .svelte-kit/output
            build

  unit-vitest:
    name: ⚡ Unit (Vitest)
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v7
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run test:unit

      - uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: vitest

  unit-bun:
    name: ⚡ Unit (Bun)
    needs: bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v7
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run test:unit:bun

      - uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: bun

  # ------------------------------------------------
  # 4. Database Matrix Tests
  # ------------------------------------------------

  db-tests:
    name: 🧪 DB (${{ matrix.db }})
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mongodb, mariadb, postgresql]
        include:
          - db: sqlite
            image: alpine # Dummy image
          - db: mongodb
            image: mongo:7
            port: 27017
          - db: mariadb
            image: mariadb:11
            port: 3306
          - db: postgresql
            image: postgres:16
            port: 5432

    services:
      db:
        image: ${{ matrix.image }}
        ports:
          - ${{ matrix.port && format('{0}:{0}', matrix.port) || '12345:12345' }}
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${{ matrix.db == 'mariadb' && 'yes' || '' }}
          MARIADB_DATABASE: ${{ matrix.db == 'mariadb' && 'sveltycms_test' || '' }}
          MARIADB_USER: ${{ matrix.db == 'mariadb' && 'testuser' || '' }}
          MARIADB_PASSWORD: ${{ matrix.db == 'mariadb' && 'testpass' || '' }}
          POSTGRES_USER: ${{ matrix.db == 'postgresql' && 'testuser' || '' }}
          POSTGRES_PASSWORD: ${{ matrix.db == 'postgresql' && 'testpass' || '' }}
          POSTGRES_DB: ${{ matrix.db == 'postgresql' && 'sveltycms_test' || '' }}
          MONGO_INITDB_ROOT_USERNAME: ${{ matrix.db == 'mongodb' && 'testuser' || '' }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ matrix.db == 'mongodb' && 'testpass' || '' }}

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v7
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v7
        with:
          name: build-output

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - name: Wait for DB
        if: matrix.db != 'sqlite'
        run: |
          # Use curl polling for DB readiness if possible, or wait-on for TCP
          bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 60000
          sleep 10

      - name: Run Integration Tests
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port || '' }}
          DB_NAME: sveltycms_test
          DB_USER: ${{ matrix.db == 'sqlite' && '' || 'testuser' }}
          DB_PASSWORD: ${{ matrix.db == 'sqlite' && '' || 'testpass' }}
          TEST_MODE: true
          SUPPRESS_JEST_WARNINGS: true
        run: |
          if [ -f tests/e2e/.auth/test-secret.txt ]; then
            export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
            echo "Using pre-generated TEST_API_SECRET"
          fi
          bun run scripts/run-integration-tests.ts --filter=${{ matrix.db }}

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preview-log-${{ matrix.db }}
          path: preview.log

  # ------------------------------------------------
  # 5. E2E tests (playwright shard)
  # ------------------------------------------------

  e2e:
    name: 🎭 E2E (${{ matrix.name }})
    needs: [bootstrap, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            name: "Wizard"
          - shard: 2
            name: "Auth"
          - shard: 3
            name: "Content"
          - shard: 4
            name: "System"

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v7
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v7
        with:
          name: build-output

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - run: bun x playwright install --with-deps chromium

      - name: Run E2E tests (Playwright sharded)
        env:
          DB_TYPE: sqlite
          TEST_MODE: true
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:4173
        run: |
          # Read the pre-generated secret for both server and Playwright
          export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          echo "Using pre-generated TEST_API_SECRET"

          # Start server in background
          bun run preview --port 4173 --host 127.0.0.1 > preview.log 2>&1 &

          # Wait for server health using curl
          for i in {1..60}; do curl -s http://127.0.0.1:4173/api/system/health && break || sleep 1; done

          # Run system setup via API
          bun run scripts/setup-system.ts

          # Run Playwright tests with sharding
          bun x playwright test --project=chromium --shard=${{ matrix.shard }}/4

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.name }}
          path: playwright-report

  # ------------------------------------------------
  # 6. Performance Benchmarks
  # ------------------------------------------------

  benchmarks:
    name: 📊 Benchmarks (${{ matrix.db }})
    needs: [db-tests]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mongodb, mariadb, postgresql]
        include:
          - db: sqlite
            image: alpine # Dummy image
          - db: mongodb
            image: mongo:7
            port: 27017
          - db: mariadb
            image: mariadb:11
            port: 3306
          - db: postgresql
            image: postgres:16
            port: 5432

    services:
      db:
        image: ${{ matrix.image }}
        ports:
          - ${{ matrix.port && format('{0}:{0}', matrix.port) || '12345:12345' }}
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${{ matrix.db == 'mariadb' && 'yes' || '' }}
          MARIADB_DATABASE: ${{ matrix.db == 'mariadb' && 'sveltycms_test' || '' }}
          MARIADB_USER: ${{ matrix.db == 'mariadb' && 'testuser' || '' }}
          MARIADB_PASSWORD: ${{ matrix.db == 'mariadb' && 'testpass' || '' }}
          POSTGRES_USER: ${{ matrix.db == 'postgresql' && 'testuser' || '' }}
          POSTGRES_PASSWORD: ${{ matrix.db == 'postgresql' && 'testpass' || '' }}
          POSTGRES_DB: ${{ matrix.db == 'postgresql' && 'sveltycms_test' || '' }}
          MONGO_INITDB_ROOT_USERNAME: ${{ matrix.db == 'mongodb' && 'testuser' || '' }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ matrix.db == 'mongodb' && 'testpass' || '' }}

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v7
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v7
        with:
          name: build-output

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - name: Wait for DB
        if: matrix.db != 'sqlite'
        run: |
          bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 60000
          sleep 5

      - name: Run System Setup (Black-Box)
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port }}
          DB_NAME: sveltycms_test
          DB_USER: ${{ matrix.db == 'sqlite' && '' || 'testuser' }}
          DB_PASSWORD: ${{ matrix.db == 'sqlite' && '' || 'testpass' }}
          TEST_MODE: true
        run: |
          # Start server in background
          bun run preview --port 4173 --host 127.0.0.1 > preview.log 2>&1 &
          # Wait for server health using curl
          for i in {1..60}; do curl -s http://127.0.0.1:4173/api/system/health && break || sleep 1; done
          # Run system setup via API
          bun run scripts/setup-system.ts

      - name: Run Performance Suite
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port }}
          DB_NAME: sveltycms_test
          DB_USER: ${{ matrix.db == 'sqlite' && '' || 'testuser' }}
          DB_PASSWORD: ${{ matrix.db == 'sqlite' && '' || 'testpass' }}
          TEST_MODE: true
        run: |
          echo "### 📊 Performance Results (${{ matrix.db }})" >> $GITHUB_STEP_SUMMARY

          echo "#### ⚡ Middleware Hooks" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          bun test tests/benchmarks/hooks-performance.test.ts >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "#### 💾 Raw Database CRUD" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          bun run tests/benchmarks/database-performance.ts >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "#### 📡 REST API Throughput" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          bun test tests/benchmarks/rest-api-performance.test.ts >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-log-${{ matrix.db }}
          path: preview.log
