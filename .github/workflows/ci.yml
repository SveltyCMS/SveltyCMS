name: CI

on:
  push:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
  pull_request:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_CACHE_DIR: .bun-cache
  NODE_OPTIONS: "--no-warnings --no-deprecation"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------
  # 1. Bootstrap (fast, produces artifacts)
  # ------------------------------------------------
  bootstrap:
    name: 🏁 Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      pw-version: ${{ steps.pw.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        id: cache-bun
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: mkdir -p ${{ env.BUN_CACHE_DIR }}

      - name: Install dependencies
        run: bun install --frozen-lockfile --prefer-offline --cache-dir ${{ env.BUN_CACHE_DIR }}

      - name: Verify Codegen
        run: |
          bun run paraglide
          bun x svelte-kit sync

      - name: Generate E2E Test Secret
        run: |
          mkdir -p tests/e2e/.auth
          echo "SVELTYCMS_E2E_MASTER_SECRET_$(date +%s)" > tests/e2e/.auth/test-secret.txt

      - id: pw
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: workspace-meta
          include-hidden-files: true
          path: |
            src/paraglide
            .svelte-kit
            tests/e2e/.auth/test-secret.txt
          retention-days: 1

  # ------------------------------------------------
  # 2. Quality gates (parallel)
  # ------------------------------------------------
  lint:
    name: 🔎 Lint
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run lint

  check:
    name: ✅ Type Check
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run check

  unit-vitest:
    name: ⚡ Unit (Vitest)
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run test:unit
      - uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: vitest

  unit-bun:
    name: ⚡ Unit (Bun)
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run test:unit:bun
      - uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: bun

  # ------------------------------------------------
  # 3. Build (supports db-tests + e2e)
  # ------------------------------------------------
  build:
    name: 🏗️ Build
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run build
      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          include-hidden-files: true
          path: |
            .svelte-kit/output
            build
          retention-days: 1

  # ------------------------------------------------
  # 4. Database Matrix Tests (with health checks)
  # ------------------------------------------------
  db-tests:
    name: 🧪 DB (${{ matrix.db }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mongodb, mariadb, postgresql]
        include:
          - db: sqlite
            image: mongo:7 # Stays alive better than alpine
            health: "true"
          - db: mongodb
            image: mongo:7
            port: 27017
            health: "mongosh --eval 'db.runCommand({ping:1})'"
          - db: mariadb
            image: mariadb:11
            port: 3306
            health: "mariadb-admin ping"
          - db: postgresql
            image: postgres:16
            port: 5432
            health: "pg_isready -U testuser"
    services:
      db:
        image: ${{ matrix.image }}
        ports:
          - ${{ matrix.port && format('{0}:{0}', matrix.port) || '12345:12345' }}
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${{ matrix.db == 'mariadb' && 'yes' || '' }}
          MARIADB_DATABASE: ${{ matrix.db == 'mariadb' && 'sveltycms_test' || '' }}
          MARIADB_USER: ${{ matrix.db == 'mariadb' && 'testuser' || '' }}
          MARIADB_PASSWORD: ${{ matrix.db == 'mariadb' && 'testpass' || '' }}
          POSTGRES_USER: ${{ matrix.db == 'postgresql' && 'testuser' || '' }}
          POSTGRES_PASSWORD: ${{ matrix.db == 'postgresql' && 'testpass' || '' }}
          POSTGRES_DB: ${{ matrix.db == 'postgresql' && 'sveltycms_test' || '' }}
          MONGO_INITDB_ROOT_USERNAME: ${{ matrix.db == 'mongodb' && 'testuser' || '' }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ matrix.db == 'mongodb' && 'testpass' || '' }}
        options: >-
          --health-cmd "${{ matrix.health }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v7
        with: { name: build-output }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - name: Wait for DB
        if: matrix.db != 'sqlite'
        run: bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 60000

      - name: Run Integration Tests
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port || '' }}
          DB_NAME: sveltycms_test
          DB_USER: ${{ matrix.db == 'sqlite' && '' || 'testuser' }}
          DB_PASSWORD: ${{ matrix.db == 'sqlite' && '' || 'testpass' }}
          ADMIN_PASSWORD: Password123!
          TEST_MODE: true
        run: |
          if [ -f tests/e2e/.auth/test-secret.txt ]; then
            export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          fi
          bun run scripts/run-integration-tests.ts --filter=${{ matrix.db }}

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-log-${{ matrix.db }}
          path: preview.log
          retention-days: 7

  # ------------------------------------------------
  # 5a. E2E – Wizard (runs once, not per shard)
  # ------------------------------------------------
  e2e-wizard:
    name: 🧙 E2E (Wizard)
    needs: [bootstrap, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v7
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v7
        with: { name: build-output }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-
      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun x playwright install --with-deps chromium
      - name: Run Wizard E2E tests
        env:
          DB_TYPE: sqlite
          DB_HOST: localhost
          DB_NAME: SveltyCMS_test
          JWT_SECRET_KEY: ci-test-jwt-secret-key-for-e2e-runs-minimum32chars
          ENCRYPTION_KEY: ci-test-encryption-key-for-e2e-runs-min32chars!!
          TEST_MODE: true
          ADMIN_PASSWORD: Password123!
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:4173
        run: |
          export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          TEST_MODE=true bun run preview --port 4173 --host 127.0.0.1 > preview.log 2>&1 &
          for i in {1..90}; do
            curl -s http://127.0.0.1:4173/api/system/health && break || sleep 1
          done
          echo "=== preview.log ===" && cat preview.log || true
          bun run scripts/setup-system.ts
          bun x playwright test --project=wizard
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-Wizard
          path: playwright-report
          retention-days: 14

