name: CI

on:
  push:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
  pull_request:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.ref_protected && github.sha || '' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_CACHE_DIR: .bun-cache
  NODE_OPTIONS: "--no-warnings --no-deprecation"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DO_NOT_TRACK: 1

jobs:
  # ------------------------------------------------
  # 1. Bootstrap — single source of truth for deps + codegen
  # ------------------------------------------------
  bootstrap:
    name: 🏁 Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      pw-version: ${{ steps.pw.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Environment
        uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"

      - name: Verify Codegen
        run: |
          bun run paraglide
          bun x svelte-kit sync

      - name: Generate E2E Test Secret
        run: |
          mkdir -p tests/e2e/.auth
          echo "SVELTYCMS_E2E_MASTER_SECRET_$(date +%s)" > tests/e2e/.auth/test-secret.txt

      - id: pw
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: workspace-meta
          include-hidden-files: true
          path: |
            src/paraglide
            .svelte-kit
            tests/e2e/.auth/test-secret.txt
          retention-days: 1

  # ------------------------------------------------
  # 2. Quality gates (parallel, no artifact deps beyond bootstrap meta)
  # ------------------------------------------------
  security-audit:
    name: 🔒 Dependency Audit
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - name: CVE Audit (bun)
        run: |
          bun audit --severity=high 2>&1
      - name: CVE Audit Summary
        run: |
          echo "### 🔒 Dependency Audit (CVE Check)" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          if bun audit --severity=high 2>&1; then
            echo "| bun audit | ✅ No high/critical vulnerabilities |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| bun audit | ❌ Vulnerabilities found |" >> $GITHUB_STEP_SUMMARY
          fi

  format:
    name: 🖌️ Format Check
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - name: Run formatter
        run: bun run format
      - name: Verify tree is clean
        run: |
          if ! git diff --exit-code --quiet; then
            echo "❌ Formatting drift detected. Run 'bun run format' locally."
            git diff --stat
            exit 1
          fi
          echo "✅ Working tree is properly formatted."

  lint:
    name: 🔎 Lint
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - run: bun run lint

  check:
    name: ✅ Type Check
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - run: bun run check

  unit:
    name: ⚡ Unit Tests
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - run: bun run test:unit
      - uses: codecov/codecov-action@v6
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit

  # ------------------------------------------------
  # 3. Build — single artifact for all downstream jobs
  # ------------------------------------------------
  build:
    name: 🏗️ Build
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - run: bun run build
        env:
          COMPILE_ALL_ADAPTERS: "true"
      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          include-hidden-files: true
          path: |
            build/
            .svelte-kit/output/
          retention-days: 1

  # ------------------------------------------------
  # 4. DB Matrix — TS config
  # ------------------------------------------------
  db-matrix:
    name: 📋 DB Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/workflows
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate DB Matrix
        id: generate
        run: |
          matrix=$(node .github/workflows/db-matrix.ts)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  # ------------------------------------------------
  # 5. DB Integration Tests (Docker Compose profiles)
  # ------------------------------------------------
  db-tests:
    name: 🧪 DB (${{ matrix.db }})
    needs: [build, db-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.db-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          restore-build: "true"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }

      - name: Start Database (Docker Compose)
        if: matrix.db != 'sqlite'
        run: |
          docker compose -f tests/docker-compose.yml --profile ${{ matrix.db }} up -d --wait
          bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 90000 --interval 2000

      - name: Create MongoDB test user
        if: matrix.db == 'mongodb'
        run: |
          docker exec $(docker ps -q -f "ancestor=mongo:latest" | head -1) \
            mongosh -u testuser -p testpass --authenticationDatabase admin --quiet --eval '
            db = db.getSiblingDB("sveltycms_test");
            try { db.createUser({ user: "testuser", pwd: "testpass", roles: [{ role: "dbOwner", db: "sveltycms_test" }] }); } catch(e) { db.grantRolesToUser("testuser", [{ role: "dbOwner", db: "sveltycms_test" }]); }
            print("MongoDB test user created or updated for sveltycms_test");
          ' || echo "MongoDB user setup failed"

      - name: Run Integration Tests
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port || '' }}
          DB_NAME: sveltycms_test
          DB_USER: ${{ matrix.db == 'sqlite' && '' || 'testuser' }}
          DB_PASSWORD: ${{ matrix.db == 'sqlite' && '' || 'testpass' }}
          ADMIN_PASSWORD: Password123!
          TEST_MODE: true
          PASSWORD_MIN_LENGTH: 8
          PORT: "4173"
        run: |
          bun run scripts/run-integration-tests.ts --db=${{ matrix.db }} --no-build

      - name: Dump Docker Logs on Failure
        if: failure() && matrix.db != 'sqlite'
        run: docker compose -f tests/docker-compose.yml --profile ${{ matrix.db }} logs

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-log-${{ matrix.db }}
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 6. E2E Prep — auth state only (single artifact)
  # ------------------------------------------------
  e2e-prep:
    name: 🧪 E2E Prep
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          restore-build: "true"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: bun x playwright install --with-deps chromium

      - name: Install Playwright Deps Only
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: bun x playwright install-deps chromium

      - name: Run Auth Setup (state only — no tests)
        env:
          DB_TYPE: sqlite
          DB_HOST: 127.0.0.1
          DB_NAME: e2e_auth_test
          DB_USER: ""
          DB_PASSWORD: ""
          PASSWORD_MIN_LENGTH: 8
          TEST_MODE: "true"
          SKIP_TEST_CLEANUP: "true"
          ADMIN_PASSWORD: Password123!
          JWT_SECRET_KEY: Auth-Setup-JWT-Secret-Key-2026-32ch
          ENCRYPTION_KEY: Auth-Setup-Encryption-Key-2026-32ch
          TEST_API_SECRET: ${{ secrets.TEST_API_SECRET }}
          HOST: 127.0.0.1
          PORT: 4173
        run: |
          mkdir -p config config/database tests/e2e/.auth logs mediaFolder

          cat > config/private.test.ts <<EOF
          export const privateEnv = {
            DB_TYPE: "sqlite",
            DB_HOST: "127.0.0.1",
            DB_NAME: "e2e_auth_test",
            DB_USER: "",
            DB_PASSWORD: "",
            JWT_SECRET_KEY: "Auth-Setup-JWT-Secret-Key-2026-32ch",
            ENCRYPTION_KEY: "Auth-Setup-Encryption-Key-2026-32ch",
            TEST_API_SECRET: "${TEST_API_SECRET}",
            PASSWORD_MIN_LENGTH: 8,
            USE_REDIS: false,
            MULTI_TENANT: false,
            DEMO: false,
            HOST_PROD: "http://127.0.0.1:4173"
          };
          export const privateConfig = privateEnv;
          export default privateEnv;
          EOF

          cp config/private.test.ts config/private.ts

          # Start the built server
          node build/index.js > preview.log 2>&1 &
          bun x wait-on tcp:127.0.0.1:4173 --timeout 180000 --interval 500
          export PLAYWRIGHT_TEST_BASE_URL=http://127.0.0.1:4173

          # Run Wizard first (sets up the system)
          bun x playwright test --project=wizard

          # Then run Auth Setup to generate auth state for other E2E tests
          bun x playwright test --project=auth-setup

      - name: Archive E2E Environment (single artifact)
        run: tar --zstd -cf e2e-env.tar.zst build/ .svelte-kit/ src/paraglide/ tests/e2e/.auth/ config/private.ts config/private.test.ts

      - uses: actions/upload-artifact@v7
        with:
          name: e2e-env-${{ github.sha }}
          path: e2e-env.tar.zst
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-Wizard-Auth
          path: tests/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: preview-log-prep
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 7. E2E Matrix — TS config
  # ------------------------------------------------
  e2e-matrix:
    name: 📋 E2E Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/workflows
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate E2E Matrix
        id: generate
        run: |
          matrix=$(node .github/workflows/e2e-matrix.ts)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  # ------------------------------------------------
  # 8. E2E Tests (sharded, uses single prep artifact)
  # ------------------------------------------------
  e2e:
    name: 🧪 E2E - ${{ matrix.project }}${{ matrix.total-shards > 1 && format(' ({0})', matrix.shard) || '' }}
    needs: [bootstrap, e2e-prep, e2e-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.e2e-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          pnpm-run-install: "false"

      - name: Download E2E Environment
        uses: actions/download-artifact@v8
        with:
          name: e2e-env-${{ github.sha }}
          path: .

      - name: Extract E2E Environment
        run: |
          if [ ! -f e2e-env.tar.zst ]; then
            echo "::error::E2E prep artifact missing. Re-run workflow."
            exit 1
          fi
          tar --zstd -xf e2e-env.tar.zst
          rm e2e-env.tar.zst

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: bun x playwright install --with-deps chromium

      - name: Install Playwright Deps Only
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: bun x playwright install-deps chromium

      - name: Run E2E Tests
        env:
          DB_TYPE: sqlite
          DB_HOST: 127.0.0.1
          DB_NAME: e2e_auth_test
          DB_USER: ""
          DB_PASSWORD: ""
          PASSWORD_MIN_LENGTH: 8
          TEST_MODE: "true"
          SKIP_TEST_CLEANUP: "true"
          ADMIN_PASSWORD: Password123!
          JWT_SECRET_KEY: Auth-Setup-JWT-Secret-Key-2026-32ch
          ENCRYPTION_KEY: Auth-Setup-Encryption-Key-2026-32ch
          TEST_API_SECRET: ${{ secrets.TEST_API_SECRET }}
          HOST: 127.0.0.1
          PORT: 4173
        run: |
          export PLAYWRIGHT_TEST_BASE_URL=http://127.0.0.1:4173
          node build/index.js > preview.log 2>&1 &
          bun x wait-on tcp:127.0.0.1:4173 --timeout 120000 --interval 500
          bun x playwright test \
            --project=${{ matrix.project }} \
            --shard=${{ matrix.shard }} \
            --fully-parallel \
            ${{ matrix.parallel == false && ' --workers=1' || '' }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}-${{ matrix.shardId }}
          path: tests/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: preview-log-${{ matrix.project }}-${{ matrix.shardId }}
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 9. Core Benchmarks (fast perf gate per DB adapter)
  # ------------------------------------------------
  bench-core:
    name: 📊 Bench (${{ matrix.db }})
    needs: [build, db-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mariadb, postgresql, mongodb]
        include:
          - db: sqlite
            port: ""
          - db: mariadb
            port: "3306"
          - db: postgresql
            port: "5432"
          - db: mongodb
            port: "27017"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          restore-build: "true"
      - uses: actions/download-artifact@v8
        with: { name: build-output }

      - name: Start Database
        if: matrix.db != 'sqlite'
        run: |
          docker compose -f tests/docker-compose.yml --profile ${{ matrix.db }} up -d --wait
          bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 90000 --interval 2000

      - name: Run Core Benchmarks
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port }}
          DB_USER: ${{ matrix.db == 'sqlite' && '' || 'testuser' }}
          DB_PASSWORD: ${{ matrix.db == 'sqlite' && '' || 'testpass' }}
          ADMIN_PASSWORD: Password123!
          TEST_MODE: "true"
          BENCHMARK_NO_REDIS: "1"
        run: |
          for test in tests/benchmarks/{truth-latency,database-performance,transaction-acid,cache-performance,hooks-performance,rest-api-performance}.test.ts; do
            echo "::group::Running $test"
            bun test "$test" --timeout 120000 || echo "FAILED: $test"
            echo "::endgroup::"
          done

      - name: Post to CI Summary
        if: always()
        run: node scripts/benchmark-matrix/generate-ci-markdown.ts

      - name: Dump Docker Logs on Failure
        if: failure() && matrix.db != 'sqlite'
        run: docker compose -f tests/docker-compose.yml --profile ${{ matrix.db }} logs

  # ------------------------------------------------
  bench-summary:
    name: 📊 Bench Summary
    needs: [bench-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate CI Summary
        run: bun run scripts/benchmark-matrix/generate-ci-markdown.ts

  # ------------------------------------------------
  # 10. All Green Gate
  # ------------------------------------------------
  all-green:
    name: ✅ All Green
    if: always()
    runs-on: ubuntu-latest
    needs:
      - bootstrap
      - build
      - format
      - lint
      - check
      - unit
      - security-audit
      - e2e-prep
      - e2e
      - db-tests
      - bench-core
    steps:
      - if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: |
          echo "::error::One or more required jobs failed or were cancelled"
          exit 1
      - if: ${{ success() }}
        run: echo "✅ All checks passed"
