name: CI

on:
  push:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
  pull_request:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_CACHE_DIR: .bun-cache
  NODE_OPTIONS: "--no-warnings --no-deprecation"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------
  # 1. Bootstrap
  # ------------------------------------------------
  bootstrap:
    name: 🏁 Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      pw-version: ${{ steps.pw.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        id: cache-bun
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: mkdir -p ${{ env.BUN_CACHE_DIR }}

      - name: Install dependencies
        run: bun install --frozen-lockfile --prefer-offline --cache-dir ${{ env.BUN_CACHE_DIR }}

      - name: Verify Codegen
        run: |
          bun run paraglide
          bun x svelte-kit sync

      - name: Generate E2E Test Secret
        run: |
          mkdir -p tests/e2e/.auth
          echo "SVELTYCMS_E2E_MASTER_SECRET_$(date +%s)" > tests/e2e/.auth/test-secret.txt

      - id: pw
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: workspace-meta
          include-hidden-files: true
          path: |
            src/paraglide
            .svelte-kit
            tests/e2e/.auth/test-secret.txt
          retention-days: 1

  # ------------------------------------------------
  # 2. Quality gates
  # ------------------------------------------------
  lint:
    name: 🔎 Lint
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run lint

  check:
    name: ✅ Type Check
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run check

  unit-vitest:
    name: ⚡ Unit (Vitest)
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run test:unit

      - uses: codecov/codecov-action@v6
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: vitest

  unit-bun:
    name: ⚡ Unit (Bun)
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run test:unit:bun

      - uses: codecov/codecov-action@v6
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: bun

  # ------------------------------------------------
  # 3. Build
  # ------------------------------------------------
  build:
    name: 🏗️ Build
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run build

      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          include-hidden-files: true
          path: |
            .svelte-kit/output
            build
          retention-days: 1

  # ------------------------------------------------
  # 4. Database Matrix Tests
  # ------------------------------------------------
  db-tests:
    name: 🧪 DB (${{ matrix.db }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mongodb, mariadb, postgresql]
        include:
          - db: sqlite
            image: alpine:latest
            health: "true"
          - db: mongodb
            image: mongo:7
            port: 27017
            health: "mongosh --quiet -u testuser -p testpass --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 }).ok'"
          - db: mariadb
            image: mariadb:11
            port: 3306
            health: "mariadb-admin ping -h localhost"
          - db: postgresql
            image: postgres:16
            port: 5432
            health: "pg_isready -U testuser"

    services:
      db:
        image: ${{ matrix.image }}
        ports:
          - ${{ matrix.port && format('{0}:{0}', matrix.port) || '12345:12345' }}
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${{ matrix.db == 'mariadb' && 'yes' || '' }}
          MARIADB_DATABASE: ${{ matrix.db == 'mariadb' && 'sveltycms_test' || '' }}
          MARIADB_USER: ${{ matrix.db == 'mariadb' && 'testuser' || '' }}
          MARIADB_PASSWORD: ${{ matrix.db == 'mariadb' && 'testpass' || '' }}
          POSTGRES_USER: ${{ matrix.db == 'postgresql' && 'testuser' || '' }}
          POSTGRES_PASSWORD: ${{ matrix.db == 'postgresql' && 'testpass' || '' }}
          POSTGRES_DB: ${{ matrix.db == 'postgresql' && 'sveltycms_test' || '' }}
          MONGO_INITDB_ROOT_USERNAME: ${{ matrix.db == 'mongodb' && 'testuser' || '' }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ matrix.db == 'mongodb' && 'testpass' || '' }}
        options: >-
          ${{ matrix.db != 'sqlite' && format('--health-cmd "{0}" --health-interval 10s --health-timeout 5s --health-retries 10', matrix.health) || '' }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v8
        with: { name: build-output }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - name: Wait for DB
        if: matrix.db != 'sqlite'
        run: bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 90000 --interval 2000

      - name: Create MongoDB test user
        if: matrix.db == 'mongodb'
        run: |
          echo "Creating/updating MongoDB test user inside sveltycms_test database..."

          MONGO_CONTAINER="$(docker ps --filter "ancestor=mongo:7" --format "{{.ID}}" | head -n 1)"

          if [ -z "$MONGO_CONTAINER" ]; then
            MONGO_CONTAINER="$(docker ps --format "{{.ID}} {{.Image}}" | awk '$2 ~ /mongo/ {print $1; exit}')"
          fi

          if [ -z "$MONGO_CONTAINER" ]; then
            echo "MongoDB container not found"
            docker ps
            exit 1
          fi

          docker exec "$MONGO_CONTAINER" mongosh --quiet "mongodb://testuser:testpass@127.0.0.1:27017/admin" --eval '
            const dbName = "sveltycms_test";
            const appDb = db.getSiblingDB(dbName);

            const roles = [
              { role: "dbOwner", db: dbName },
              { role: "readWrite", db: dbName },
              { role: "clusterMonitor", db: "admin" },
              { role: "dbAdminAnyDatabase", db: "admin" }
            ];

            const existingUser = appDb.getUser("testuser");

            if (existingUser) {
              appDb.updateUser("testuser", {
                pwd: "testpass",
                roles
              });
              print("MongoDB test user updated with dbOwner + clusterMonitor permissions");
            } else {
              appDb.createUser({
                user: "testuser",
                pwd: "testpass",
                roles
              });
              print("MongoDB test user created with dbOwner + clusterMonitor permissions");
            }
          '

      - name: Run Integration Tests
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port || '' }}
          DB_NAME: sveltycms_test
          DB_USER: ${{ matrix.db == 'sqlite' && '' || 'testuser' }}
          DB_PASSWORD: ${{ matrix.db == 'sqlite' && '' || 'testpass' }}
          ADMIN_PASSWORD: Password123!
          TEST_MODE: true
          PASSWORD_MIN_LENGTH: 8
        run: |
          if [ -f tests/e2e/.auth/test-secret.txt ]; then
            export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          fi
          bun run scripts/run-integration-tests.ts --db=${{ matrix.db }}

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-log-${{ matrix.db }}
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 5. E2E – Wizard
  # ------------------------------------------------
  e2e-wizard:
    name: 🧙 E2E (Wizard)
    needs: [bootstrap, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v8
        with: { name: build-output }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun x playwright install --with-deps chromium

      - name: Run Wizard E2E tests
        env:
          PASSWORD_MIN_LENGTH: 8
          TEST_API_SECRET: ${{ secrets.TEST_API_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.BENCHMARK_ADMIN_PASSWORD || 'Password123!' }}
        run: |
          if [ -f tests/e2e/.auth/test-secret.txt ]; then
            export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          fi

          # Ensure clean state for wizard
          rm -rf config/private.ts config/private.test.ts config/database/* tests/e2e/.auth/user.json logs/* || true

          HOST=127.0.0.1 \
          PORT=4173 \
          PASSWORD_MIN_LENGTH=8 \
          TEST_MODE=true \
          TEST_API_SECRET="$TEST_API_SECRET" \
          node build/index.js > preview.log 2>&1 &

          # Increase timeout and add explicit logging
          echo "Waiting for preview server on http://127.0.0.1:4173..."
          bun x wait-on http://127.0.0.1:4173 --timeout 180000 --interval 2000 || (cat preview.log && exit 1)

          # Run the consolidated Wizard suite
          bun x playwright test tests/e2e/setup-wizard.spec.ts --project=wizard

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-Wizard
          path: tests/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: preview-log-wizard
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 6. E2E – Auth Setup
  # ------------------------------------------------
  e2e-auth:
    name: 🔐 E2E (Auth Setup)
    needs: [bootstrap, e2e-wizard]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v8
        with: { name: build-output }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun x playwright install --with-deps chromium

      - name: Run Auth Setup project
        env:
          DB_TYPE: sqlite
          DB_HOST: 127.0.0.1
          DB_PORT: ""
          DB_NAME: e2e_auth_test
          DB_USER: ""
          DB_PASSWORD: ""
          DB_AUTH_SOURCE: ""
          PASSWORD_MIN_LENGTH: 8
          TEST_MODE: "true"
          SKIP_TEST_CLEANUP: "true"
          ADMIN_PASSWORD: Password123!
          JWT_SECRET_KEY: Auth-Setup-JWT-Secret-Key-2026
          ENCRYPTION_KEY: Auth-Setup-Encryption-Key-2026-32ch
        run: |
          export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)

          mkdir -p config config/database tests/e2e/.auth logs mediaFolder

          cat > config/private.test.ts <<EOF
          export const privateEnv = {
            DB_TYPE: "sqlite",
            DB_HOST: "127.0.0.1",
            DB_NAME: "e2e_auth_test",
            DB_USER: "",
            DB_PASSWORD: "",
            JWT_SECRET_KEY: "Auth-Setup-JWT-Secret-Key-2026",
            ENCRYPTION_KEY: "Auth-Setup-Encryption-Key-2026-32ch",
            TEST_API_SECRET: "${TEST_API_SECRET}",
            PASSWORD_MIN_LENGTH: 8,
            USE_REDIS: false,
            MULTI_TENANT: false,
            DEMO: false,
            HOST_PROD: "http://127.0.0.1:4173"
          };

          export const privateConfig = privateEnv;
          export default privateEnv;
          EOF

          cp config/private.test.ts config/private.ts

          trap 'echo "::group::preview.log"; cat preview.log || true; echo "::endgroup::"' EXIT

          TEST_MODE=true \
          DB_TYPE=sqlite \
          DB_HOST=127.0.0.1 \
          DB_PORT="" \
          DB_NAME=e2e_auth_test \
          DB_USER="" \
          DB_PASSWORD="" \
          DB_AUTH_SOURCE="" \
          PASSWORD_MIN_LENGTH=8 \
          SKIP_TEST_CLEANUP=true \
          ADMIN_PASSWORD=Password123! \
          JWT_SECRET_KEY=Auth-Setup-JWT-Secret-Key-2026 \
          ENCRYPTION_KEY=Auth-Setup-Encryption-Key-2026-32ch \
          TEST_API_SECRET="$TEST_API_SECRET" \
          bun run dev -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &


          sleep 5
          cat preview.log || true
          bun x wait-on tcp:127.0.0.1:4173 --timeout 180000 --interval 2000
          bun x playwright test --project=auth-setup

      - uses: actions/upload-artifact@v7
        with:
          name: e2e-auth-state
          path: tests/e2e/.auth/
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 1

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-Auth
          path: tests/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: preview-log-auth
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 7. E2E – App Tests
  # ------------------------------------------------
  e2e-app:
    name: 🧪 E2E (${{ matrix.project }})
    needs: [bootstrap, e2e-auth]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        project: [signup, content, system]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v8
        with: { name: build-output }
      - uses: actions/download-artifact@v8
        with:
          name: e2e-auth-state
          path: tests/e2e/.auth/
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun x playwright install --with-deps chromium

      - name: Run E2E (${{ matrix.project }}) project
        env:
          DB_TYPE: sqlite
          PASSWORD_MIN_LENGTH: 8
          TEST_MODE: "true"
          SKIP_TEST_CLEANUP: "true"
        run: |
          export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)

          DB_HOST=127.0.0.1 \
          HOST=127.0.0.1 \
          PORT=4173 \
          PASSWORD_MIN_LENGTH=8 \
          TEST_MODE=true \
          SKIP_TEST_CLEANUP=true \
          TEST_API_SECRET="$TEST_API_SECRET" \
          node build/index.js > preview.log 2>&1 &

          bun x wait-on http://127.0.0.1:4173 --timeout 120000 --interval 2000
          bun x playwright test --project=${{ matrix.project }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: tests/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: preview-log-${{ matrix.project }}
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 8. Benchmarks
  # ------------------------------------------------
  benchmarks:
    name: 📊 Benchmarks (${{ matrix.db }})
    needs: [db-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-benchmarks')
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mongodb, mariadb, postgresql]
        include:
          - db: sqlite
            image: alpine:latest
            health: "true"
          - db: mongodb
            image: mongo:7
            port: 27017
            health: "mongosh --quiet -u testuser -p testpass --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 }).ok'"
          - db: mariadb
            image: mariadb:11
            port: 3306
            health: "mariadb-admin ping -h localhost"
          - db: postgresql
            image: postgres:16
            port: 5432
            health: "pg_isready -U testuser"

    services:
      db:
        image: ${{ matrix.image }}
        ports:
          - ${{ matrix.port && format('{0}:{0}', matrix.port) || '12345:12345' }}
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${{ matrix.db == 'mariadb' && 'yes' || '' }}
          MARIADB_DATABASE: ${{ matrix.db == 'mariadb' && 'sveltycms_bench' || '' }}
          MARIADB_USER: ${{ matrix.db == 'mariadb' && 'testuser' || '' }}
          MARIADB_PASSWORD: ${{ matrix.db == 'mariadb' && 'testpass' || '' }}
          POSTGRES_USER: ${{ matrix.db == 'postgresql' && 'testuser' || '' }}
          POSTGRES_PASSWORD: ${{ matrix.db == 'postgresql' && 'testpass' || '' }}
          POSTGRES_DB: ${{ matrix.db == 'postgresql' && 'sveltycms_bench' || '' }}
          MONGO_INITDB_ROOT_USERNAME: ${{ matrix.db == 'mongodb' && 'testuser' || '' }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ matrix.db == 'mongodb' && 'testpass' || '' }}
        options: >-
          ${{ matrix.db != 'sqlite' && format('--health-cmd "{0}" --health-interval 10s --health-timeout 5s --health-retries 6', matrix.health) || '' }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v8
        with: { name: build-output }
      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - name: Wait for DB
        if: matrix.db != 'sqlite'
        run: bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 90000 --interval 2000

      - name: Create MongoDB benchmark user
        if: matrix.db == 'mongodb'
        run: |
          echo "Creating/updating MongoDB benchmark user inside sveltycms_bench database..."

          MONGO_CONTAINER="$(docker ps --filter "ancestor=mongo:7" --format "{{.ID}}" | head -n 1)"

          if [ -z "$MONGO_CONTAINER" ]; then
            MONGO_CONTAINER="$(docker ps --format "{{.ID}} {{.Image}}" | awk '$2 ~ /mongo/ {print $1; exit}')"
          fi

          if [ -z "$MONGO_CONTAINER" ]; then
            echo "MongoDB container not found"
            docker ps
            exit 1
          fi

          docker exec "$MONGO_CONTAINER" mongosh --quiet "mongodb://testuser:testpass@127.0.0.1:27017/admin" --eval '
            const dbName = "sveltycms_bench";
            const appDb = db.getSiblingDB(dbName);

            const roles = [
              { role: "dbOwner", db: dbName },
              { role: "readWrite", db: dbName },
              { role: "clusterMonitor", db: "admin" },
              { role: "dbAdminAnyDatabase", db: "admin" }
            ];

            const existingUser = appDb.getUser("testuser");

            if (existingUser) {
              appDb.updateUser("testuser", {
                pwd: "testpass",
                roles
              });
              print("MongoDB benchmark user updated with dbOwner + clusterMonitor permissions");
            } else {
              appDb.createUser({
                user: "testuser",
                pwd: "testpass",
                roles
              });
              print("MongoDB benchmark user created with dbOwner + clusterMonitor permissions");
            }
          '

      - name: Run Enterprise Benchmark Matrix
        env:
          DB_USER: ${{ matrix.db == 'sqlite' && '' || 'testuser' }}
          DB_PASSWORD: ${{ matrix.db == 'sqlite' && '' || 'testpass' }}
          ADMIN_PASSWORD: ${{ secrets.BENCHMARK_ADMIN_PASSWORD || 'Password123!' }}
          TEST_API_SECRET: ${{ secrets.TEST_API_SECRET }}
        run: |
          if [ -f tests/e2e/.auth/test-secret.txt ]; then
            export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          fi

          # Ensure clean state for benchmarks
          rm -rf config/private.ts config/database/* tests/e2e/.auth/user.json logs/* || true

          bun run scripts/benchmark-matrix/index.ts \
            --no-build \
            --db=${{ matrix.db }} \
            --level=4 \
            --skip-redis \
            --ci

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results-${{ matrix.db }}
          path: tests/benchmarks/results/
          if-no-files-found: ignore
          retention-days: 14
