name: CI SveltyCMS Final Fix

on:
  push:
    branches: [next, main]
  pull_request:
    branches: [next, main]

permissions:
  contents: read

jobs:
  build:
    name: 🏗️ Build & Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run paraglide
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          include-hidden-files: true
          path: |
            .svelte-kit/
            build/
            package.json
            bun.lockb

  test-e2e:
    name: 🎭 Playwright E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .
      - run: bun install --frozen-lockfile
      
      - name: 🚀 Run Setup Wizard & Tests
        run: |
          # 1. Lancer le serveur en arrière-plan
          bun run preview > preview.log 2>&1 &
          
          # 2. ATTENTE CRITIQUE : On attend que l'API soit 100% prête
          # On augmente le timeout à 90s pour être sûr
          bun x wait-on http://127.0.0.1 --timeout 90000
          
          # 3. Installation des navigateurs
          bun x playwright install --with-deps chromium
          
          # 4. Exécution du Setup Wizard (le fameux correctif)
          # Ce test va créer l'admin automatiquement
          bun x playwright test tests/e2e/setup-wizard.spec.ts --project=chromium
          
          # 5. Lancement de la suite complète de tests Blackbox
          bun x playwright test
        env:
          TEST_MODE: true
          DB_TYPE: sqlite

      - name: 📄 Sauvegarder les logs si échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            preview.log
            test-results/
