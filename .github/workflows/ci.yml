name: CI

on:
  push:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
  pull_request:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.ref_protected && github.sha || '' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_CACHE_DIR: .bun-cache
  NODE_OPTIONS: "--no-warnings --no-deprecation"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DO_NOT_TRACK: 1

jobs:
  # ------------------------------------------------
  # 1. Bootstrap — single source of truth for deps + codegen
  # ------------------------------------------------
  bootstrap:
    name: 🏁 Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      pw-version: ${{ steps.pw.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Environment
        uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"

      - name: Verify Codegen
        run: |
          bun run paraglide
          bun x svelte-kit sync

      - name: Generate E2E Test Secret
        run: |
          mkdir -p tests/e2e/.auth
          echo "SVELTYCMS_E2E_MASTER_SECRET_$(date +%s)" > tests/e2e/.auth/test-secret.txt

      - id: pw
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: workspace-meta
          include-hidden-files: true
          path: |
            src/paraglide
            .svelte-kit
            tests/e2e/.auth/test-secret.txt
          retention-days: 1

  # ------------------------------------------------
  # 2. Quality gates (parallel, no artifact deps beyond bootstrap meta)
  # ------------------------------------------------
  security-audit:
    name: 🔒 Dependency Audit
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - name: CVE Audit (npm)
        run: |
          npm i --package-lock-only
          npm audit --omit=dev --audit-level=critical
      - name: CVE Audit Summary
        run: |
          echo "## 🔒 Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --omit=dev --json 2>/dev/null | jq -r '.metadata // empty | "**Total:** \(.totalDependencies) deps | **Vulnerabilities:** \(.vulnerabilities.critical // 0) critical, \(.vulnerabilities.high // 0) high, \(.vulnerabilities.moderate // 0) moderate"' >> $GITHUB_STEP_SUMMARY || echo "Audit completed" >> $GITHUB_STEP_SUMMARY

  format:
    name: 🖌️ Format Check
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - name: Run formatter
        run: bun run format
      - name: Verify tree is clean (no unformatted files)
        run: |
          if ! git diff --exit-code --quiet; then
            echo ""
            echo "❌  Formatting drift detected."
            echo "    Run 'bun run format' locally (or let the pre-commit hook do it),"
            echo "    stage the fixes, and push again."
            echo ""
            git diff --stat
            exit 1
          fi
          echo "✅  Working tree is properly formatted."

  lint:
    name: 🔎 Lint
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - run: bun run lint

  check:
    name: ✅ Type Check
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - run: bun run check

  unit:
    name: ⚡ Unit Tests
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - run: bun run test:unit
      - uses: codecov/codecov-action@v6
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit

  # ------------------------------------------------
  # 3. Build — single artifact for all downstream jobs
  # ------------------------------------------------
  build:
    name: 🏗️ Build
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - run: bun run build
        env:
          COMPILE_ALL_ADAPTERS: "true"
      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          include-hidden-files: true
          path: |
            build/
            .svelte-kit/output/
          retention-days: 1

  # ------------------------------------------------
  # 4. DB Matrix — TS config (enhancement: TS config instead of hardcoded YAML)
  # ------------------------------------------------
  db-matrix:
    name: 📋 DB Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/workflows
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate DB Matrix
        id: generate
        run: |
          matrix=$(node .github/workflows/db-matrix.ts)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  # ------------------------------------------------
  # 5. DB Integration Tests (enhancement: Docker Compose + TS matrix)
  # ------------------------------------------------
  db-tests:
    name: 🧪 DB (${{ matrix.db }})
    needs: [build, db-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.db-matrix.outputs.matrix) }}
    services:
      db:
        image: ${{ matrix.image }}
        ports:
          - "${{ matrix.port }}:${{ matrix.port }}"
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${{ matrix.db == 'mariadb' && 'yes' || '' }}
          MARIADB_DATABASE: ${{ matrix.db == 'mariadb' && 'sveltycms_test' || '' }}
          MARIADB_USER: ${{ matrix.db == 'mariadb' && 'testuser' || '' }}
          MARIADB_PASSWORD: ${{ matrix.db == 'mariadb' && 'testpass' || '' }}
          POSTGRES_USER: ${{ matrix.db == 'postgresql' && 'testuser' || '' }}
          POSTGRES_PASSWORD: ${{ matrix.db == 'postgresql' && 'testpass' || '' }}
          POSTGRES_DB: ${{ matrix.db == 'postgresql' && 'sveltycms_test' || '' }}
          MONGO_INITDB_ROOT_USERNAME: ${{ matrix.db == 'mongodb' && 'testuser' || '' }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ matrix.db == 'mongodb' && 'testpass' || '' }}
        options: >-
          --health-cmd "${{ matrix.db == 'mariadb' && 'mariadb-admin ping -h localhost' || matrix.db == 'postgresql' && 'pg_isready -U testuser' || matrix.db == 'mongodb' && 'mongosh --quiet -u testuser -p testpass --authenticationDatabase admin --eval \"db.runCommand({ ping: 1 }).ok\"' || 'echo healthy' }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          restore-build: "true"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - name: Wait for DB
        if: matrix.db != 'sqlite'
        run: bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 90000 --interval 2000
      - name: Create MongoDB test user
        if: matrix.db == 'mongodb'
        run: |
          # Create the application-level test database and user
          docker exec $(docker ps -q -f "ancestor=mongo:7" | head -1) \
            mongosh -u testuser -p testpass --authenticationDatabase admin --quiet --eval '
            db = db.getSiblingDB("sveltycms_test");
            db.createUser({ user: "testuser", pwd: "testpass", roles: [{ role: "readWrite", db: "sveltycms_test" }] });
            print("MongoDB test user created for sveltycms_test");
          ' || echo "MongoDB user may already exist"
      - name: Create MariaDB integration database
        if: matrix.db == 'mariadb'
        run: |
          docker exec $(docker ps -q -f "ancestor=mariadb:11" | head -1) \
            mariadb -u root -e "CREATE DATABASE IF NOT EXISTS sveltycms_test; GRANT ALL PRIVILEGES ON sveltycms_test.* TO 'testuser'@'%'; FLUSH PRIVILEGES;"

      - name: Run Integration Tests
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port || '' }}
          DB_NAME: sveltycms_test
          DB_USER: ${{ matrix.db == 'sqlite' && '' || 'testuser' }}
          DB_PASSWORD: ${{ matrix.db == 'sqlite' && '' || 'testpass' }}
          ADMIN_PASSWORD: Password123!
          TEST_MODE: true
          PASSWORD_MIN_LENGTH: 8
        run: |
          bun run scripts/run-integration-tests.ts --db=${{ matrix.db }} --no-build

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-log-${{ matrix.db }}
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 6. E2E Prep — single source for auth state (enhancement: move auth from separate job)
  # ------------------------------------------------
  e2e-prep:
    name: 🧪 E2E Prep
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          restore-build: "true"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: bun x playwright install --with-deps chromium

      - name: Install Playwright Deps Only
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: bun x playwright install-deps chromium

      - name: Run Auth Setup (generate state once)
        env:
          DB_TYPE: sqlite
          DB_HOST: 127.0.0.1
          DB_NAME: e2e_auth_test
          DB_USER: ""
          DB_PASSWORD: ""
          PASSWORD_MIN_LENGTH: 8
          TEST_MODE: "true"
          SKIP_TEST_CLEANUP: "true"
          ADMIN_PASSWORD: Password123!
          JWT_SECRET_KEY: Auth-Setup-JWT-Secret-Key-2026
          ENCRYPTION_KEY: Auth-Setup-Encryption-Key-2026-32ch
          TEST_API_SECRET: ${{ secrets.TEST_API_SECRET }}
          HOST: 127.0.0.1
          PORT: 4173
        run: |
          mkdir -p config config/database tests/e2e/.auth logs mediaFolder

          cat > config/private.test.ts <<EOF
          export const privateEnv = {
            DB_TYPE: "sqlite",
            DB_HOST: "127.0.0.1",
            DB_NAME: "e2e_auth_test",
            DB_USER: "",
            DB_PASSWORD: "",
            JWT_SECRET_KEY: "Auth-Setup-JWT-Secret-Key-2026",
            ENCRYPTION_KEY: "Auth-Setup-Encryption-Key-2026-32ch",
            TEST_API_SECRET: "${TEST_API_SECRET}",
            PASSWORD_MIN_LENGTH: 8,
            USE_REDIS: false,
            MULTI_TENANT: false,
            DEMO: false,
            HOST_PROD: "http://127.0.0.1:4173"
          };
          export const privateConfig = privateEnv;
          export default privateEnv;
          EOF

          cp config/private.test.ts config/private.ts

          # Run Wizard E2E first
          node build/index.js > preview.log 2>&1 &
          bun x wait-on tcp:127.0.0.1:4173 --timeout 180000 --interval 500
          export PLAYWRIGHT_TEST_BASE_URL=http://127.0.0.1:4173
          bun x playwright test --project=Wizard

          # Run Auth Setup to generate auth state
          bun x playwright test --project=Auth

      - name: Archive E2E Auth State
        uses: actions/upload-artifact@v7
        with:
          name: e2e-auth-state
          path: tests/e2e/.auth/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-Wizard-Auth
          path: tests/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: preview-log-prep
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 7. E2E Matrix — TS config (enhancement: TS config + sharding)
  # ------------------------------------------------
  e2e-matrix:
    name: 📋 E2E Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/workflows
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate E2E Matrix
        id: generate
        run: |
          matrix=$(node .github/workflows/e2e-matrix.ts)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  # ------------------------------------------------
  # 8. E2E Tests (enhancement: test-level sharding with --fully-parallel)
  # ------------------------------------------------
  e2e:
    name: 🧪 E2E - ${{ matrix.project }}${{ matrix.total-shards > 1 && format(' ({0})', matrix.shard) || '' }}
    needs: [e2e-prep, e2e-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.e2e-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          restore-build: "true"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - uses: actions/download-artifact@v8
        with:
          name: e2e-auth-state
          path: tests/e2e/.auth/

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: bun x playwright install --with-deps chromium

      - name: Install Playwright Deps Only
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: bun x playwright install-deps chromium

      - name: Run E2E Tests (sharded, fully parallel)
        env:
          DB_TYPE: sqlite
          DB_HOST: 127.0.0.1
          DB_NAME: e2e_auth_test
          DB_USER: ""
          DB_PASSWORD: ""
          PASSWORD_MIN_LENGTH: 8
          TEST_MODE: "true"
          SKIP_TEST_CLEANUP: "true"
          ADMIN_PASSWORD: Password123!
          JWT_SECRET_KEY: Auth-Setup-JWT-Secret-Key-2026
          ENCRYPTION_KEY: Auth-Setup-Encryption-Key-2026-32ch
          TEST_API_SECRET: ${{ secrets.TEST_API_SECRET }}
          HOST: 127.0.0.1
          PORT: 4173
        run: |
          export PLAYWRIGHT_TEST_BASE_URL=http://127.0.0.1:4173
          node build/index.js > preview.log 2>&1 &
          bun x wait-on tcp:127.0.0.1:4173 --timeout 120000 --interval 500
          bun x playwright test \
            --project=${{ matrix.project }} \
            --shard=${{ matrix.shard }} \
            --fully-parallel \
            ${{ matrix.parallel == false && ' --workers=1' || '' }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}-${{ matrix.shard }}
          path: tests/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: preview-log-${{ matrix.project }}-${{ matrix.shard }}
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  # ------------------------------------------------
  # 9. Benchmarks (conditional, matrix from TS)
  # ------------------------------------------------
  benchmarks:
    name: 📊 Benchmarks (${{ matrix.db }})
    needs: [build, db-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-benchmarks')
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.db-matrix.outputs.matrix) }}
    services:
      db:
        image: ${{ matrix.image }}
        ports:
          - "${{ matrix.port }}:${{ matrix.port }}"
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${{ matrix.db == 'mariadb' && 'yes' || '' }}
          MARIADB_DATABASE: ${{ matrix.db == 'mariadb' && 'sveltycms_bench' || '' }}
          MARIADB_USER: ${{ matrix.db == 'mariadb' && 'testuser' || '' }}
          MARIADB_PASSWORD: ${{ matrix.db == 'mariadb' && 'testpass' || '' }}
          POSTGRES_USER: ${{ matrix.db == 'postgresql' && 'testuser' || '' }}
          POSTGRES_PASSWORD: ${{ matrix.db == 'postgresql' && 'testpass' || '' }}
          POSTGRES_DB: ${{ matrix.db == 'postgresql' && 'sveltycms_bench' || '' }}
          MONGO_INITDB_ROOT_USERNAME: ${{ matrix.db == 'mongodb' && 'testuser' || '' }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ matrix.db == 'mongodb' && 'testpass' || '' }}
        options: >-
          --health-cmd "${{ matrix.db == 'mariadb' && 'mariadb-admin ping -h localhost' || matrix.db == 'postgresql' && 'pg_isready -U testuser' || matrix.db == 'mongodb' && 'mongosh --quiet -u testuser -p testpass --authenticationDatabase admin --eval \"db.runCommand({ ping: 1 }).ok\"' || 'echo healthy' }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-sveltycms
        with:
          bun-version: "1.3.14"
          node-version: "24"
          restore-build: "true"
      - uses: actions/download-artifact@v8
        with: { name: workspace-meta }
      - name: Wait for DB
        if: matrix.db != 'sqlite'
        run: bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 90000 --interval 2000
      - name: Create MongoDB benchmark user
        if: matrix.db == 'mongodb'
        run: |
          docker exec $(docker ps -q -f "ancestor=mongo:7" | head -1) \
            mongosh -u testuser -p testpass --authenticationDatabase admin --quiet --eval '
            db = db.getSiblingDB("sveltycms_bench");
            db.createUser({ user: "testuser", pwd: "testpass", roles: [{ role: "readWrite", db: "sveltycms_bench" }] });
            print("MongoDB benchmark user created for sveltycms_bench");
          ' || echo "MongoDB user may already exist"

      - name: Run Enterprise Benchmark Matrix
        env:
          DB_USER: ${{ matrix.db == 'sqlite' && '' || 'testuser' }}
          DB_PASSWORD: ${{ matrix.db == 'sqlite' && '' || 'testpass' }}
          ADMIN_PASSWORD: ${{ secrets.BENCHMARK_ADMIN_PASSWORD || 'Password123!' }}
          TEST_API_SECRET: ${{ secrets.TEST_API_SECRET }}
        run: |
          rm -rf config/private.ts config/database/* tests/e2e/.auth/user.json logs/* || true
          bun run scripts/benchmark-matrix/index.ts \
            --no-build \
            --db=${{ matrix.db }} \
            --level=4 \
            --skip-redis \
            --ci

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results-${{ matrix.db }}
          path: tests/benchmarks/results/
          if-no-files-found: ignore
          retention-days: 14

  # ------------------------------------------------
  # 10. All Green Gate
  # ------------------------------------------------
  all-green:
    name: ✅ All Green
    if: always()
    runs-on: ubuntu-latest
    needs:
      - format
      - lint
      - check
      - unit
      - security-audit
      - e2e
      - db-tests
      - benchmarks
    steps:
      - if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: |
          echo "::error::One or more required jobs failed or were cancelled"
          exit 1
      - if: ${{ success() }}
        run: echo "✅ All checks passed"
