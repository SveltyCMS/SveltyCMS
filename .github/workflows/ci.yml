name: CI SveltyCMS Corrigé

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

permissions:
  contents: read

jobs:
  # Étape 1 : Préparation de l'environnement
  bootstrap:
    name: 🏁 Bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run paraglide
      - run: bun x svelte-kit sync
      - run: mkdir -p config && echo "export const privateEnv = {};" > config/private.test.ts
      - uses: actions/upload-artifact@v4
        with:
          name: workspace-meta
          include-hidden-files: true
          path: |
            .svelte-kit/
            src/paraglide/
            config/private.test.ts

  # Étape 2 : Construction du projet
  build:
    name: 🏗️ Build
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v4
        with:
          name: workspace-meta
          path: .
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          include-hidden-files: true
          path: |
            .svelte-kit/output
            build
            package.json
            bun.lockb

  # Étape 3 : Tests E2E avec passage automatique du Setup Wizard
  tests:
    name: 🎭 Tests & Setup Wizard
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .
      - run: bun install --frozen-lockfile
      - name: 🚀 Initialisation & Tests
        run: |
          # Démarrer le serveur en arrière-plan
          bun run preview > preview.log 2>&1 &
          # Attendre que le port 4173 soit ouvert
          bun x wait-on http://127.0.0.1:4173 --timeout 60000
          # Installer les navigateurs
          bun x playwright install --with-deps chromium
          # REMPLIR LE FORMULAIRE SIGN-UP AUTOMATIQUEMENT
          bun x playwright test tests/e2e/setup-wizard.spec.ts --project=chromium
          # LANCER LE RESTE DES TESTS
          bun x playwright test
        env:
          TEST_MODE: true
          DB_TYPE: sqlite

      - name: 📄 Upload Logs en cas d'erreur
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preview-logs
          path: preview.log
