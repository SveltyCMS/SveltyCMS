name: CI

on:
  push:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
  pull_request:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_CACHE_DIR: .bun-cache
  NODE_OPTIONS: "--no-warnings --no-deprecation"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bootstrap:
    name: 🏁 Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      pw-version: ${{ steps.pw.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: mkdir -p ${{ env.BUN_CACHE_DIR }}

      - name: Install dependencies
        run: bun install --frozen-lockfile --prefer-offline --cache-dir ${{ env.BUN_CACHE_DIR }}

      - name: Verify Codegen
        run: |
          bun run paraglide
          bun x svelte-kit sync

      - name: Generate E2E Test Secret
        run: |
          mkdir -p tests/e2e/.auth
          echo "SVELTYCMS_E2E_MASTER_SECRET_$(date +%s)" > tests/e2e/.auth/test-secret.txt

      - id: pw
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: workspace-meta
          include-hidden-files: true
          path: |
            src/paraglide
            .svelte-kit
            tests/e2e/.auth/test-secret.txt
          retention-days: 1

  lint:
    name: 🔎 Lint
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run lint

  check:
    name: ✅ Type Check
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run check

  unit-vitest:
    name: ⚡ Unit (Vitest)
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run test:unit

      - uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: vitest

  unit-bun:
    name: ⚡ Unit (Bun)
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run test:unit:bun

      - uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: bun

  build:
    name: 🏗️ Build
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: workspace-meta

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun run build

      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          include-hidden-files: true
          path: |
            .svelte-kit/output
            build
          retention-days: 1

  db-tests:
    name: 🧪 DB (${{ matrix.db }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mongodb, mariadb, postgresql]
        include:
          - db: sqlite
            image: mongo:7
            health: "true"
          - db: mongodb
            image: mongo:7
            port: 27017
            health: "mongosh --eval 'db.runCommand({ ping: 1 })'"
          - db: mariadb
            image: mariadb:11
            port: 3306
            health: "mariadb-admin ping"
          - db: postgresql
            image: postgres:16
            port: 5432
            health: "pg_isready -U testuser"

    services:
      db:
        image: ${{ matrix.image }}
        ports:
          - ${{ matrix.port && format('{0}:{0}', matrix.port) || '12345:12345' }}
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${{ matrix.db == 'mariadb' && 'yes' || '' }}
          MARIADB_DATABASE: ${{ matrix.db == 'mariadb' && 'sveltycms_test' || '' }}
          MARIADB_USER: ${{ matrix.db == 'mariadb' && 'testuser' || '' }}
          MARIADB_PASSWORD: ${{ matrix.db == 'mariadb' && 'testpass' || '' }}
          POSTGRES_USER: ${{ matrix.db == 'postgresql' && 'testuser' || '' }}
          POSTGRES_PASSWORD: ${{ matrix.db == 'postgresql' && 'testpass' || '' }}
          POSTGRES_DB: ${{ matrix.db == 'postgresql' && 'sveltycms_test' || '' }}
          MONGO_INITDB_ROOT_USERNAME: ${{ matrix.db == 'mongodb' && 'testuser' || '' }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ matrix.db == 'mongodb' && 'testpass' || '' }}
        options: >-
          --health-cmd "${{ matrix.health }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - name: Wait for DB
        if: matrix.db != 'sqlite'
        run: bun x wait-on tcp:127.0.0.1:${{ matrix.port }} --timeout 120000 --interval 2000

      - name: Create MongoDB test user
        if: matrix.db == 'mongodb'
        run: |
          docker run --rm --network host mongo:7 mongosh "mongodb://testuser:testpass@127.0.0.1:27017/admin" \
            --eval '
              const dbName = "sveltycms_test";
              const appDb = db.getSiblingDB(dbName);

              const roles = [
                { role: "dbOwner", db: dbName },
                { role: "readWrite", db: dbName },
                { role: "clusterMonitor", db: "admin" }
              ];

              try {
                appDb.createUser({
                  user: "testuser",
                  pwd: "testpass",
                  roles
                });
                print("MongoDB app test user created with dbOwner + clusterMonitor");
              } catch (e) {
                if (String(e).includes("already exists")) {
                  appDb.updateUser("testuser", {
                    pwd: "testpass",
                    roles
                  });
                  print("MongoDB app test user updated with dbOwner + clusterMonitor");
                } else {
                  throw e;
                }
              }
            '

      - name: Run DB Integration Tests
        env:
          DB_TYPE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port || '' }}
          DB_NAME: sveltycms_test
          DB_USER: ${{ matrix.db != 'sqlite' && 'testuser' || '' }}
          DB_PASSWORD: ${{ matrix.db != 'sqlite' && 'testpass' || '' }}
          DB_AUTH_SOURCE: ${{ matrix.db == 'mongodb' && 'sveltycms_test' || '' }}
          ADMIN_PASSWORD: Password123!
          TEST_MODE: true
          PASSWORD_MIN_LENGTH: 8
        run: |
          if [ -f tests/e2e/.auth/test-secret.txt ]; then
            export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          fi

          bun run scripts/run-integration-tests.ts --suite=db --db=${{ matrix.db }}

      - name: Upload DB Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-log-${{ matrix.db }}
          path: |
            preview.log
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  integration-api:
    name: 🌐 API Integration
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache

      - name: Run API Integration Tests
        env:
          DB_TYPE: sqlite
          DB_HOST: 127.0.0.1
          DB_PORT: ""
          DB_NAME: sveltycms_test
          DB_USER: ""
          DB_PASSWORD: ""
          DB_AUTH_SOURCE: ""
          ADMIN_PASSWORD: Password123!
          TEST_MODE: true
          PASSWORD_MIN_LENGTH: 8
        run: |
          if [ -f tests/e2e/.auth/test-secret.txt ]; then
            export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)
          fi

          bun run scripts/run-integration-tests.ts --suite=api --db=sqlite

      - name: Upload API Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-integration-log
          path: |
            preview.log
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  e2e-wizard:
    name: 🧙 E2E (Wizard)
    needs: [bootstrap, build]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun x playwright install --with-deps chromium

      - name: Run Wizard E2E tests
        env:
          DB_TYPE: sqlite
          DB_HOST: config/database
          DB_PORT: ""
          DB_NAME: e2e_setup_test
          DB_USER: ""
          DB_PASSWORD: ""
          DB_AUTH_SOURCE: ""
          PASSWORD_MIN_LENGTH: 8
          TEST_MODE: "true"
          ADMIN_PASSWORD: Password123!
        run: |
          export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)

          rm -f config/private.ts config/private.test.ts
          rm -rf config/database mediaFolder mediaFolder_e2e
          mkdir -p config/database mediaFolder tests/e2e/.auth

          DB_TYPE=sqlite \
          DB_HOST=config/database \
          DB_PORT="" \
          DB_NAME=e2e_setup_test \
          DB_USER="" \
          DB_PASSWORD="" \
          DB_AUTH_SOURCE="" \
          PASSWORD_MIN_LENGTH=8 \
          TEST_MODE=true \
          ADMIN_PASSWORD=Password123! \
          TEST_API_SECRET="$TEST_API_SECRET" \
          bun run preview --host 127.0.0.1 > preview.log 2>&1 &

          bun x wait-on http://127.0.0.1:4173 --timeout 180000 --interval 2000
          bun x playwright test tests/e2e/setup-wizard.spec.ts --project=wizard

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-Wizard
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: preview-log-wizard
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  e2e-auth:
    name: 🔐 E2E (Auth Setup)
    needs: [bootstrap, build, e2e-wizard]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun x playwright install --with-deps chromium

      - name: Run Auth Setup project
        env:
          DB_TYPE: sqlite
          DB_HOST: 127.0.0.1
          DB_PORT: ""
          DB_NAME: e2e_auth_test
          DB_USER: ""
          DB_PASSWORD: ""
          DB_AUTH_SOURCE: ""
          PASSWORD_MIN_LENGTH: 8
          TEST_MODE: "true"
          SKIP_TEST_CLEANUP: "true"
          ADMIN_PASSWORD: Password123!
        run: |
          export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)

          DB_TYPE=sqlite \
          DB_HOST=127.0.0.1 \
          DB_PORT="" \
          DB_NAME=e2e_auth_test \
          DB_USER="" \
          DB_PASSWORD="" \
          DB_AUTH_SOURCE="" \
          PASSWORD_MIN_LENGTH=8 \
          TEST_MODE=true \
          SKIP_TEST_CLEANUP=true \
          ADMIN_PASSWORD=Password123! \
          TEST_API_SECRET="$TEST_API_SECRET" \
          bun run preview --host 127.0.0.1 > preview.log 2>&1 &

          bun x wait-on http://127.0.0.1:4173 --timeout 180000 --interval 2000
          bun x playwright test --project=auth-setup

      - uses: actions/upload-artifact@v7
        with:
          name: e2e-auth-state
          path: tests/e2e/.auth/
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 1

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-Auth
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: preview-log-auth
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  e2e-app:
    name: 🧪 E2E (${{ matrix.project }})
    needs: [bootstrap, build, e2e-auth]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        project: [signup, content, system]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          name: workspace-meta

      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - uses: actions/download-artifact@v8
        with:
          name: e2e-auth-state
          path: tests/e2e/.auth/

      - uses: actions/cache@v5
        with:
          path: |
            .bun-cache
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}
          restore-keys: playwright-${{ runner.os }}-

      - run: bun install --frozen-lockfile --prefer-offline --cache-dir .bun-cache
      - run: bun x playwright install --with-deps chromium

      - name: Run E2E app project
        env:
          DB_TYPE: sqlite
          DB_HOST: 127.0.0.1
          DB_PORT: ""
          DB_NAME: e2e_app_${{ matrix.project }}
          DB_USER: ""
          DB_PASSWORD: ""
          DB_AUTH_SOURCE: ""
          PASSWORD_MIN_LENGTH: 8
          TEST_MODE: "true"
          SKIP_TEST_CLEANUP: "true"
          ADMIN_PASSWORD: Password123!
        run: |
          export TEST_API_SECRET=$(cat tests/e2e/.auth/test-secret.txt)

          DB_TYPE=sqlite \
          DB_HOST=127.0.0.1 \
          DB_PORT="" \
          DB_NAME=e2e_app_${{ matrix.project }} \
          DB_USER="" \
          DB_PASSWORD="" \
          DB_AUTH_SOURCE="" \
          PASSWORD_MIN_LENGTH=8 \
          TEST_MODE=true \
          SKIP_TEST_CLEANUP=true \
          ADMIN_PASSWORD=Password123! \
          TEST_API_SECRET="$TEST_API_SECRET" \
          bun run preview --host 127.0.0.1 > preview.log 2>&1 &

          bun x wait-on http://127.0.0.1:4173 --timeout 180000 --interval 2000
          bun x playwright test --project=${{ matrix.project }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: preview-log-${{ matrix.project }}
          path: preview.log
          if-no-files-found: ignore
          retention-days: 7

  benchmarks:
    name: 📊 Benchmarks
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: false
    steps:
      - run: echo "Benchmarks are disabled in fork CI."