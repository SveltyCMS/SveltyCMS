# .github/workflows/auto-release.yaml
# Primary: triggers automatically when CI passes on main (reads version from package.json).
# Fallback: manually triggered with version input for emergency releases.
# Syncs version back to package.json so it always matches the git tag.
name: Auto Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.x) — only needed for manual trigger"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [ -n "$MANUAL_VERSION" ]; then
            echo "value=$MANUAL_VERSION" >> $GITHUB_OUTPUT
            echo "source=manual input" >> $GITHUB_OUTPUT
          else
            PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
            echo "value=$PKG_VERSION" >> $GITHUB_OUTPUT
            echo "source=package.json" >> $GITHUB_OUTPUT
          fi
        env:
          MANUAL_VERSION: ${{ github.event.inputs.version }}

      - name: Log version
        run: |
          echo "Publishing v$VERSION (from $SOURCE)"
        env:
          VERSION: ${{ steps.version.outputs.value }}
          SOURCE: ${{ steps.version.outputs.source }}

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — skipping tag creation"
          else
            git tag "v$VERSION"
            git push origin "v$VERSION"
            echo "Created and pushed tag v$VERSION"
          fi
        env:
          VERSION: ${{ steps.version.outputs.value }}

      - name: Publish to npm
        run: bun x npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
