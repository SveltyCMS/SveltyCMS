# .github/workflows/auto-release.yaml
# This workflow uses semantic-release to automatically publish new versions of your package to GitHub based on commit messages.
#
# CURRENT: Tests run against MongoDB only before release
# FUTURE: Will test against multiple databases (MongoDB, PostgreSQL, MariaDB, MySQL) before allowing release
name: Auto Release

# Triggers the workflow ONLY when a push happens to the main or next branch.
on:
  push:
    branches: [main] # Only release from protected main branch
  workflow_dispatch: {} # Allow manual release if needed

permissions:
  contents: write # Allow changelog + tags
  issues: write # Allow release notes on issues
  pull-requests: write # Comment on PRs for releases

jobs:
  test:
    name: Run Playwright Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports: [27017:27017]
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin
    env:
      DB_TYPE: mongodb
      DB_HOST: localhost
      DB_PORT: 27017
      DB_NAME: sveltycms_test
      DB_USER: admin
      DB_PASSWORD: admin
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Browsers
        run: bun x playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          DB_TYPE: ${{ env.DB_TYPE }}
          DB_HOST: 127.0.0.1
          DB_NAME: sveltycms_test
          DB_USER: admin
          DB_PASSWORD: admin
          TEST_MODE: true
        run: |
          # 1. Start preview server in background
          bun run preview > preview.log 2>&1 &
          bun x wait-on http://localhost:4173/api/system/health --timeout 60000

          # 2. Run Setup Wizard via Playwright to generate config/private.test.ts naturally
          bun x playwright install --with-deps chromium
          bun x playwright test tests/e2e/setup-wizard.spec.ts

          # 3. Run remaining Playwright tests
          bun x playwright test
        timeout-minutes: 15

  release:
    name: Release with Semantic Release # Auto version + changelog
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: [test] # Only release if tests pass

    steps:
      # Get git code
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 is required for semantic-release to analyze the full commit history.
          fetch-depth: 0

      # Setup Bun environment
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache Bun dependencies
      - name: Cache Bun dependencies
        id: bun-cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Install only what's needed for release
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # This step is specific to your main branch cleanup requirement.
      - name: Ensure /config/collections is empty in main
        # This only runs on the main branch.
        if: github.ref == 'refs/heads/main'
        run: |
          # If the collections directory exists, remove it.
          if [ -d "config/collections" ]; then
            echo "Removing config/collections to maintain a clean main branch..."
            git rm -r --cached config/collections
            rm -rf config/collections
            
            # Commit the changes if any files were removed.
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            # The '|| true' ensures the workflow doesn't fail if there's nothing to commit.
            git commit -m "chore(build): auto-remove collections directory for release [skip ci]" || true
            git push origin main
            echo "Collections directory removed and changes pushed."
          else
            echo "No collections directory found — main is already clean."
          fi

      - name: Run semantic-release
        run: bunx semantic-release
        env:
          # The GITHUB_TOKEN is automatically provided by GitHub Actions.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 💡 Phase 2: Enable NPM publishing once core is separated
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-preview-log
          path: preview.log
