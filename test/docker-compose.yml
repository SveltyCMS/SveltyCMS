# Docker Compose for local & CI database testing
# Start a profile: docker compose -f test/docker-compose.yml --profile <name> up -d
# Examples:
#   docker compose -f test/docker-compose.yml --profile mongodb up -d
#   docker compose -f test/docker-compose.yml --profile mariadb up -d
#   docker compose -f test/docker-compose.yml --profile postgresql up -d
#   docker compose -f test/docker-compose.yml --profile redis up -d
#
# Stop all: docker compose -f test/docker-compose.yml --profile '*' down
#
# Uses :latest tags to match local Docker Desktop development setup.
# CI pins these via db-matrix.ts for reproducibility.

services:
  mongodb:
    image: mongo:latest
    profiles: [mongodb]
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: testuser
      MONGO_INITDB_ROOT_PASSWORD: testpass
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "-u",
          "testuser",
          "-p",
          "testpass",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.runCommand({ ping: 1 }).ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  mariadb:
    image: mariadb:latest
    profiles: [mariadb]
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
      MARIADB_DATABASE: sveltycms_test
      MARIADB_USER: testuser
      MARIADB_PASSWORD: testpass
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgresql:
    image: postgres:latest
    profiles: [postgresql]
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: sveltycms_test
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "testuser"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:latest
    profiles: [redis]
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
