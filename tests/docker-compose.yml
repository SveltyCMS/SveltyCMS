# Docker Compose for local & CI database testing
# Start a profile: docker compose -f tests/docker-compose.yml --profile <name> up -d
# Examples:
#   docker compose -f tests/docker-compose.yml --profile mongodb up -d
#   docker compose -f tests/docker-compose.yml --profile mariadb up -d
#   docker compose -f tests/docker-compose.yml --profile postgresql up -d
#   docker compose -f tests/docker-compose.yml --profile redis up -d
#
# Stop all: docker compose -f tests/docker-compose.yml --profile '*' down
#
# Credentials match official image defaults (see src/utils/test-db-credentials.ts).
# Uses :latest tags to match local Docker Desktop development setup.
# CI pins these via db-matrix.ts for reproducibility.

services:
  mongodb:
    image: mongo:latest
    profiles: [mongodb]
    restart: unless-stopped
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  mariadb:
    image: mariadb:latest
    profiles: [mariadb]
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: mariadb
      MARIADB_DATABASE: sveltycms_test
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgresql:
    image: postgres:latest
    profiles: [postgresql]
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sveltycms_test
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:latest
    profiles: [redis]
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
